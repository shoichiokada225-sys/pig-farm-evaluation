<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSS 評価システム</title>
<meta name="theme-color" content="#2e7d6f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hdr">
  <div style="width:100px"></div>
  <h1 data-t="appTitle">HSS 評価システム</h1>
  <div class="lsw">
    <button class="on" onclick="setLang('ja')">JP</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('vi')">VI</button>
    <button onclick="setLang('id')">ID</button>
  </div>
</header>

<div class="modebar">
  <button id="modeBarn" class="on" onclick="setMode('barn')" data-t="modeBarn">豚舎別評価</button>
  <button id="modeWork" onclick="setMode('work')" data-t="modeWork">作業評価</button>
</div>

<div class="barnbar" id="barnbar">
  <span class="barnbar-lbl" data-t="barnLbl">🏠 豚舎</span>
  <select id="barnSel" onchange="setBarn(this.value)"></select>
</div>

<div class="barnbar" id="workbar" style="display:none;flex-wrap:wrap;gap:8px">
  <span class="barnbar-lbl" data-t="workLbl">🐖 作業</span>
  <select id="workCatSel" onchange="setWorkCat(this.value)" style="flex:1 1 120px"></select>
  <select id="workSel" onchange="setWork(this.value)" style="flex:1 1 160px"></select>
</div>

<div class="ebar" id="editBar">
  <span data-t="editingBanner">編集中</span>
  <button onclick="cancelEdit()" data-t="cancelEdit">取消</button>
</div>

<!-- 入力 -->
<div id="pgIn" class="pg on">
  <div class="prog"><div class="prog-b"><div class="prog-f" id="progF"></div></div><span class="prog-t" id="progT"></span></div>
  <div class="cd meta">
    <label data-t="labelDate">評価日</label>
    <input type="date" id="fDate">
    <label data-t="labelEvaluator">評価者名</label>
    <input type="text" id="fEv" data-ph="phEv" placeholder="例：山田太郎">
    <label data-t="labelEvaluatee">被評価者名</label>
    <input type="text" id="fEe" data-ph="phEe" placeholder="例：佐藤花子">
  </div>
  <div id="cards"></div>
  <div class="cd oasec">
    <h3 data-t="overall">全体所感</h3>
    <textarea id="fOv" class="oata" rows="4" data-ph="phOv" placeholder="全体的な評価や今後の期待などを記入..."></textarea>
  </div>
  <div class="bg">
    <button class="b b1" id="btnSave" onclick="doSave()" data-t="btnSave">保存</button>
    <button class="b b2" onclick="doReset()" data-t="btnReset">リセット</button>
  </div>
</div>

<!-- 履歴 -->
<div id="pgHi" class="pg">
  <div class="hctrl">
    <select id="hFil" onchange="drawHist()"><option value="" data-t="filterAll">全員</option></select>
    <button class="b b3" onclick="doCSV()" style="flex:0 0 auto;padding:10px 16px;font-size:.85rem" data-t="btnCSV">CSV出力</button>
  </div>
  <div id="hList" class="hlist"></div>
</div>

<!-- グラフ -->
<div id="pgCh" class="pg">
  <div class="chc">
    <label style="font-size:.85rem;font-weight:600;color:var(--sub);display:block;margin-bottom:6px" data-t="selEe">被評価者を選択</label>
    <select id="chSel" onchange="drawCharts()"><option value="" data-t="selPh">-- 選択してください --</option></select>
  </div>
  <div id="chArea">
    <div class="chb"><h3 data-t="chLine">平均点の推移</h3><canvas id="cvL"></canvas></div>
    <div class="chb"><h3 data-t="chRadar">項目別レーダーチャート（直近）</h3><canvas id="cvR"></canvas></div>
  </div>
  <div id="chNone" class="nd" style="display:none" data-t="selEe"></div>
</div>

<!-- 設定 -->
<div id="pgCfg" class="pg">
  <div id="cfgArea"></div>
  <div class="cfg-add">
    <button onclick="addSection()" data-t="addSec">＋ セクション追加</button>
  </div>
  <div style="margin-top:24px">
    <button class="b b1" style="width:100%" onclick="saveCfg()" data-t="saveCfg">設定を保存</button>
  </div>
  <div style="margin-top:12px">
    <button class="b b2" style="width:100%" onclick="resetCfg()" data-t="resetCfg">初期設定に戻す</button>
  </div>

  <div style="margin-top:28px;border-top:1px dashed var(--bdr);padding-top:18px">
    <p data-t="expHint" style="font-size:.8rem;color:var(--sub);line-height:1.6;margin:0 0 12px">別のPCへ評価項目を渡すには「書き出し」でファイルを保存し、そのファイルを相手のPCの「読み込み」で取り込みます。</p>
    <button class="b b4" style="width:100%" onclick="exportCfg()" data-t="expCfg">⬇ 項目を書き出し（ファイル保存）</button>
    <div style="margin-top:12px">
      <button class="b b3" style="width:100%" onclick="document.getElementById('impFile').click()" data-t="impCfg">⬆ 項目を読み込み（ファイルから）</button>
    </div>
    <input type="file" id="impFile" accept="application/json,.json" style="display:none" onchange="importCfg(this)">
  </div>

  <div style="margin-top:28px;border-top:1px dashed var(--bdr);padding-top:18px">
    <p data-t="backupHint" style="font-size:.8rem;color:var(--sub);line-height:1.6;margin:0 0 12px">端末の故障や誤消去に備えて、全豚舎の評価データと項目を1ファイルに保存できます。復元では既存の記録は残り、新しい記録だけが追加されます。</p>
    <button class="b b4" style="width:100%" onclick="exportAll()" data-t="expAll">⬇ 全データをバックアップ（評価＋項目）</button>
    <div style="margin-top:12px">
      <button class="b b3" style="width:100%" onclick="document.getElementById('impAllFile').click()" data-t="impAll">⬆ バックアップから復元</button>
    </div>
    <input type="file" id="impAllFile" accept="application/json,.json" style="display:none" onchange="importAll(this)">
  </div>
</div>

<!-- モーダル -->
<div class="mo" id="modal" onclick="if(event.target===this)closeMo()">
  <div class="mc" id="moBody"></div>
</div>
<div class="toast" id="toast"></div>

<!-- タブ -->
<nav class="tabs">
  <button class="on" data-pg="pgIn" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM14 3.5L18.5 8H14V3.5zM6 20V4h6v6h6v10H6z"/><path d="M8 13h8v1.5H8zM8 16h5v1.5H8z"/></svg>
    <span data-t="tabIn">入力</span>
  </button>
  <button data-pg="pgHi" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <span data-t="tabHi">履歴</span>
  </button>
  <button data-pg="pgCh" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    <span data-t="tabCh">グラフ</span>
  </button>
  <button data-pg="pgCfg" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    <span data-t="tabCfg">設定</span>
  </button>
</nav>

<script id="criteriaData" type="application/json">[{"key":"farrow","sheet":"分娩舎","scale":"業務","items":[{"no":"分-1","name":"母豚の健康観察（食欲・行動・乳房状態の確認、異常の有無）","kanten":"分娩舎の母豚を毎日見回り、飼料の食べ具合・起立の様子・乳房の張りや乳の出・尻まわりの汚れやにおい・飲水量を確認し、平常との違いに気づけるか。発熱が疑われるときは体温を測定できるか。","level1":"母豚の前を素通りし、飼料の食べ残しや、横臥したまま動かない母豚に気づかない。乳房の赤みや腫れ、尻まわりの異臭をともなう汚れを見ても異常と捉えず放置する。見回り自体も、指示がなければ行わない。","level2":"指示があれば、飼料の食べ残しや元気の有無はある程度確認できるが、乳房の張りや乳の出のかたより、飲水量の低下などを見落としがち。異常かどうかの判断は常に他者まかせで、自力では正常か異常かの線引きができない。","level3":"指示があればひと通り見回り、飼料の食べ残し・呼んでも起立しない元気のなさ・尻まわりの異臭をともなう汚れなど、目に見える異常に気づける。乳房をひと通り触れて張りを確認し、子豚がすべての乳首に吸いついているか（腹部がふくれているか）も確かめられる。","level4":"指示がなくても毎日欠かさず見回り、飼料の摂取が落ちたり元気がなかったりすれば、発熱を疑って体温を測定する。平常より高ければ分娩後の体調不良（乳房の腫れ・発熱・乳の出が悪い 等）を疑い、乳房のしこりや熱感、乳の出、飲水量まで確かめて原因を探り、給餌を控えて飲水を促すなど、初期の手当てをしたうえで報告できる。","level5":"観察結果を分娩後の体調不良の知識と結びつけて的確に捉え、上長への相談・経過観察・授乳の工夫・移動の判断・記録・報告まで自力で判断できる。体格・栄養状態（やせ・標準・過肥）を目安に、母豚ごとに給餌量を細かく加減し、体温・飲水・乳の出の平常の様子と着眼点を新人に指導できる。"},{"no":"分-2","name":"分娩介助の対応（介助タイミング、難産時の処置、分娩記録の正確性）","kanten":"分娩の進行間隔に注意を払いながら見守り、難産の見分け・産道の確認や子豚の引き出し・定められた分娩処置や薬剤の使用・記録を、清潔かつ正確に行えるか。","level1":"分娩の進み具合を見ておらず、子豚が産道で引っかかっても気づかない。手指を消毒せず、潤滑剤も使わずに産道へ手を入れる、無理に引っ張るなど、危険で雑な扱いをする。出生数や死産数の記録も行わない。","level2":"指示があれば分娩を見守れるが、分娩間隔を正確に計れず、難産の見分けが遅れがち。介助の要否は他者まかせで、定められた分娩薬の使い方も自力では判断できず、記録も抜け漏れが多い。","level3":"指示があれば分娩間隔を計りながら見守り、口や鼻のぬめりを取る・乾いたタオルで拭く・へその緒を適切な長さで切って消毒する、という一連の流れを行える。生存出生数・死産数・腹中で育たず固まって生まれた子豚の数を正しく記録し、分娩間隔が空くなど難産が疑われれば報告できる。","level4":"指示がなくても分娩を計りながら見守り、分娩間隔が平常より空きすぎれば難産を疑う。まず母豚を起立させて向きを変えるよう促し、改善しなければ清潔な長手袋をして潤滑剤を用い、産道を確かめ、母豚のいきみに合わせて慎重に引き出す。産道に子豚がいなければ定められた分娩薬を用いて経過を見て、それでも生まれなければ上長へ連絡する。胎盤が排出されたか、分娩後の体温も確かめる。","level5":"子豚が大きすぎる・体位が悪い・いきむ力が弱いなど、難産の原因を見分けて手当てを選べる。産道の入り口が十分に開く前に分娩薬を用いると母豚の損傷や死産を招くと理解し、開き具合の確認と用量を必ず守る。分娩記録（出生数・死産数・所要時間・介助の内容）を成績の見直しや次回の分娩管理に役立てつつ、介助の見極めと手技を新人に指導できる。"},{"no":"分-3","name":"子豚のケア（初乳給与、去勢・歯切り・断尾・体重測定などの処置）","kanten":"生まれたばかりの子豚に初乳を与えて保温し、鉄分の補給・歯切り・尾の処置・去勢などを、適切な時期に清潔かつ正確に行えるか。","level1":"初乳を飲めていない弱い子豚への対応や、保温場所の用意をおろそかにする。鉄分の補給や歯切りを指示されても行えず、あるいは不潔で雑な手技により出血や事故を生じさせる。","level2":"指示があれば処置の一部は行えるが、初乳の摂取確認のもれや、鉄分の注入部位・量、去勢時期の誤りが多い。処置の可否や順序は他者まかせ。","level3":"指示があれば、出生後できるだけ早く初乳の摂取を介助し、適切な時期に鉄分の注射を後肢に行い、とがった歯の歯切り・必要に応じた尾の処置・時期を見た去勢をひと通り行える。へその緒を消毒し、保温場所を確かめられる。","level4":"指示がなくても、各子豚が初乳を十分に飲めているかを腹部のふくらみで確かめ、飲めない小さい子豚には分けて与える。初乳が不十分だと離乳前の死亡が大きく増えると理解し、処置の際は器具の消毒・出血の抑制を徹底し、去勢には痛みをやわらげる処置を併せるなど、適切な初期対応ができる。","level5":"各処置の意味（病気から守る力を得る・乳首の損傷を防ぐ・闘争による傷を防ぐ）を、子豚は出生後まもなく母乳の重要な成分を取り込む力を失うといった知識で理解し、子豚の状態を見て処置の順序や実施の可否を判断・微調整できる。体重の測定値や処置の記録を残して小さい子豚の育成方針を定め、清潔で安全な手技を新人に指導できる。"},{"no":"分-4","name":"哺乳・離乳管理（人工哺乳、里子調整、離乳作業の段取り）","kanten":"出生頭数と、利用できる乳首の数・体重の釣り合いを見て、ほかの母豚への預け（里子）・人工乳による育成を調整し、離乳作業を正しい段取りで進められるか。","level1":"乳首にあぶれた子豚を放置し、里子に出す・人工乳で育てる必要に気づかない。人工乳の温度や量も適当で、離乳作業も指示がなければ動けない。","level2":"指示があれば里子付けや人工乳の手伝いはできるが、実施時期や対象の選び方を誤りやすく見落としが多い。離乳の時期や体重の目安を理解しておらず、段取りは他者まかせ。","level3":"指示があれば、利用できる乳首の数を超えてあまった子豚をほかの母豚に預け、人工乳を適温に温めて適切な間隔・量で与えられる。離乳に適した時期と体重を目安に作業をひと通り進められる。","level4":"指示がなくても子豚の体重を見て、各母豚につく子豚の体重がそろうよう振り分け、里子は初乳を与えたあとできるだけ早く、分娩時期の近い母豚につける段取りを自ら組む。移す子豚に預け先のにおいをつける、乳の飲みや体重の増え方を見て定着するまで確かめるなど、先回りした対応ができる。","level5":"里子・人工乳・離乳の各判断を、乳の出のピークを過ぎると子豚に乳が不足することや、子豚の入れ替えが過多だと病気を広げやすいことといった知識で裏づけ、調整を最小限に抑えて最適化できる。離乳は母豚を移して子豚は慣れた場所に残すなどでストレスを抑える工夫をし、離乳後の下痢の予防まで見越して記録・改善し、段取りを新人に指導できる。"},{"no":"分-5","name":"衛生管理・消毒（豚房清掃、器具消毒、防疫意識）","kanten":"分娩用の囲いや器具を正しい手順で洗浄・消毒し、人や物の動線と、病気を持ち込まない意識をもって清潔を保てるか。","level1":"糞や汚れが残ったまま消毒液をまく、希釈や作用時間を守らないなど、効果のない雑な手順をとる。器具を使い回し、汚れた場所からきれいな場所へ逆行するなど、防疫の意識がない。","level2":"指示があれば清掃・消毒はある程度できるが、洗浄が不十分・乾燥の手順を省く・消毒液の希釈を誤ることが多い。何をどの順で消毒するかは他者まかせ。","level3":"指示があれば「糞を取る→粗洗い→つけ置き→高圧洗浄→乾燥→消毒→乾燥」の手順で囲いを洗浄・消毒し、分娩用器具を消毒液で消毒できる。作業着・長靴の着用、手指の消毒など、基本の清潔な動作ができる。","level4":"指示がなくても、汚れが残ると消毒が効かないと理解し、高圧で隅々まで洗い、十分に乾燥させてから消毒する。母豚を入れる前に空ける期間をとり、きれいな場所（分娩舎）から汚れた場所への一方通行を自ら守って、汚れの往来を防ぐ。","level5":"消毒液の特性（汚れがあると効かない・効きにくい病原がある 等）と、対象の病原・温度・作用時間をふまえて、薬剤と希釈を選べる。豚を全頭出して洗浄・消毒し、まとめて入れ替える方式を計画的に運用し、消毒記録（日時・薬剤・濃度）を残して効果を検証し、防疫の手順を新人に指導できる。"},{"no":"分-6","name":"環境管理（温度・湿度・換気・保温灯の調整）","kanten":"母豚と子豚で適温が異なることをふまえ、保温灯・換気・冷却の工夫を、季節と子豚の発育に合わせて調整できるか。","level1":"保温灯をつけ忘れる、母豚向けと子豚向けの適温の違いを理解せず放置する。すきま風・換気の不良・刺激臭のガスに気づかず、子豚の寒さや母豚の暑さを見落とす。","level2":"指示があれば保温灯のオンオフや温度の確認はできるが、設定の目安があいまいで見落としが多い。換気量や湿度の調整、暑熱・寒冷への対応の判断は他者まかせ。","level3":"指示があれば、母豚のいる場所と子豚の保温場所のそれぞれの適温を目安に保温灯やヒーターを調整し、温度計を確かめられる。強い臭気やすきま風など、目視・体感できる異常に気づける。","level4":"指示がなくても、子豚の保温灯やマットを発育につれて段階的に弱め、天候に合わせて温度を調整する。子豚の集まり方（寒いと密集、暑いと分散）や呼吸の様子から寒暑を読み取り、暑い時は母豚に水を垂らして冷やす、寒い時は風を防いで温めるなど、適切な初期対応ができる。換気は臭気がこもらないよう配慮する。","level5":"子豚は冷えやすく、授乳中の母豚は体が熱くなりやすいという相反する要求を両立させる重要性を理解し、保温・換気・冷却のバランスを微調整できる。暑熱の程度や母豚の呼吸（速く浅い呼吸は暑熱に注意）を目安に対策を強め、設定や記録を残して改善し、適切な温度管理の考え方を新人に指導できる。"},{"no":"分-7","name":"異常の早期発見と報告（疾病・事故・死亡の早期察知と報連相）","kanten":"母豚・子豚の疾病・負傷・死亡を早期に発見し、緊急度を見極めて、的確に報告・連絡・相談できるか。","level1":"高熱・耳や皮膚の紫色化・急死・圧死・新生子豚の下痢などの異常を見ても気づかない、または気づいても報告せず放置する。後に判明して対応が大きく遅れる。","level2":"指示があれば異常に気づけるが、見落としや報告の遅れが多い。緊急か経過観察かの判断ができず、誰に何を伝えるかも他者まかせで、報告・連絡・相談が不十分。","level3":"指示があれば、明らかな異常（飼料を食べない、高熱、水様の下痢、胎盤の残留、死亡・圧死）を見つけ、上長へ報告できる。目に見える事実を確かめ、伝えるべき内容をひと通り報告できる。","level4":"指示がなくても日頃から見回って早期に異常へ気づき、発熱を疑えば体温を測定し、平常より高ければ分娩後の体調不良を疑うなど、緊急度を見極める。耳や皮膚の紫色化・急死、新生子豚の下痢が同じ腹や隣の囲いに広がるなどの重い兆候は、直ちに上長へ連絡し、隔離・初期対応を併せて行う。","level5":"様子から疾病の可能性を知識で見立て、隔離・手当ての相談・経過観察を自ら判断して動ける。発生事項（日時・症状・頭数・経過）を正しく記録して再発防止・改善につなげ、誰に・何を・どの程度の緊急度で報告すべきかの基準を新人に指導できる。"}]},{"key":"stall","sheet":"ストール舎","scale":"業務","items":[{"no":"ス-1","name":"発情発見・種付けのタイミング（発情観察、人工授精・交配の的確さとタイミング）","kanten":"母豚の陰部の腫れ・赤み・粘液、他の豚に乗りかかる動き、背中を押すと静止する発情の兆候、雄豚を用いた確認、離乳からの経過日数の記録をふまえ、種付けの適期を見極めて実施できるか。","level1":"母豚の陰部が腫れて赤くなったり粘液が出ても、発情と気づけない。背中を押して静止するか確かめる手順もあいまいで、兆候を見落とす。種付けの時期が判断できず、実施の可否は毎回指示や補助を要する。","level2":"指示があれば陰部の変化や、母豚が他の豚に乗りかかる動きには気づくが、雄豚を近づけて背中を押し、静止するかを確かめる確認が不十分で、一部しか把握できない。種付けの時期の判断は他者任せで、適期を外すことが多い。","level3":"指示があれば朝夕など決まった時間に発情を見回り、陰部の腫れ・粘液や、背中を押すと静止する兆候を確かめられる。指示されたタイミングで一通りの種付け作業ができる。","level4":"指示がなくても、発情の見込み日を周期や離乳からの経過日数で予測し重点的に観察する。静止する兆候を確かめてから適切な間隔をおいて種付けする。初産の母豚と経産の母豚とで適期に差があることをふまえ、雄豚を前に置いて背中を押し、落ち着かせて実施するなど丁寧に行える。","level5":"排卵が発情開始からしばらく経って起こり、経産の母豚では遅くなる体の仕組みを正しく理解する。発情の強さや持続の長さ（初産か経産かで異なる）を見て、種付けの回数や間隔を細かく調整できる。確実な受胎を目標に成績をふまえ自らの手順を見直し、発情の再発する割合や夏場に発情が弱まることも考慮して記録・判断し、同僚や新人に指導できる。"},{"no":"ス-2","name":"妊娠鑑定・再発チェック（不受胎・流産の早期発見、再種付けの管理）","kanten":"種付けから一定期間後の発情の再発の有無の観察、超音波による胎子の袋や心拍の確認、不受胎の母豚や流産の早期発見、再種付けの段取りができるか。","level1":"発情の再発の確認を怠り、不受胎の母豚を妊娠と取り違える。超音波の当て方もあいまいで胎子の袋を確認できず、不受胎や流産を見逃すため毎回補助を要する。","level2":"指示があれば発情の再発予定日に観察するが見落としが多く、受胎の有無の判断や再種付けの段取りは他者任せ。流産の早期発見ができないことがある。","level3":"指示に従い、種付けから一定期間後に発情の再発の有無を確かめ、超音波を母豚の右下腹部に当てて胎子の袋や心拍を確認できる。不受胎や流産の目立つ兆候には気づける。","level4":"指示がなくても発情周期に合わせて再発の見込み日を予測し重点的に観察し、種付け後の適期に超音波で複数回確認する。発情の再発する母豚が多ければ精液の質・種付けの時期・自らの手順を疑い、不受胎の母豚を速やかに再種付けへ回せる。","level5":"種付けからの経過が短すぎると、受胎していても不受胎と判定される場合があるため、日をおいて再確認するなど、確実に判別できる時期を理解している。真の妊娠とまぎらわしい状態（子宮に膿がたまる不調など）を見分け、不受胎・流産の生じやすさの傾向をふまえ原因への対処・記録を検討し、同僚や新人に指導できる。"},{"no":"ス-3","name":"母豚の体況管理（体格・栄養状態の見分け、給餌量の調整、やせすぎ・過肥の防止）","kanten":"母豚の体格・栄養状態（やせ・標準・過肥）を腰や背・肋骨に触れて見分け、妊娠の時期に応じて飼料の量を加減し、やせすぎ・過肥を防げるか。","level1":"やせすぎ・過肥を見ても判断できず、体格を見る部位も分からない。飼料の量を加減できず、栄養状態を放置する。","level2":"指示があれば極端なやせや過肥には気づくが、体格を段階で見分けるのがあいまいで、飼料を増減する判断は他者任せ。個体に応じた加減に漏れが多い。","level3":"指示があれば体格を段階で見分け、腰や背・肋骨に触れて脂肪のつき方を確かめられる。やせすぎや過肥を見つけられる。","level4":"指示がなくても妊娠初期と分娩前に体格を確認し、適正な状態を保つよう一頭ごとに飼料の量を加減する。妊娠の初期・中期・後期で飼料量を増減し、やせすぎ・過肥を防ぐ。","level5":"背の脂肪の厚みを定められた部位で測定して客観的に見分け、過肥は分娩を重くして食欲を落とし、やせすぎは産子数を減らし泌乳を悪くすることを理解する。泌乳期にやせさせすぎると次の分娩成績に影響することを見越して先回りで細かく加減し、記録して改善し、同僚や新人に指導できる。"},{"no":"ス-4","name":"給餌・給水管理（飼料の種類・量の管理、給水器の点検）","kanten":"妊娠の時期に応じた飼料の種類・量、食べ残しの確認、給水器の水の出と量の点検、飲み水を十分に確保できるか。","level1":"飼料の種類や量を取り違え、給水器の水の出が悪くても気づかず放置する。食べ残しや水切れに気づけず、飼料の量を加減できない。","level2":"指示があれば定められた量を給与できるが、妊娠の時期ごとの使い分けや給水器の点検に漏れが多く、過不足の判断は他者任せ。","level3":"指示があれば妊娠の時期に応じて飼料の量を変えて給与し（初期・中期・後期で量を変える）、給水器から水が出ているかを確かめられる。","level4":"指示がなくても飼料の食べ具合（食べ残しの有無）を毎日確かめ、給水器の水の出を点検する。妊娠中の母豚に水切れを生じさせず、泌乳中の母豚には多く要する飲み水を十分に用意し、暑い時期は涼しい朝夕に給与時間をずらすなどの工夫ができる。","level5":"飼料の栄養の内容や、暑い時期は冷たい水が食欲の維持に役立つことを理解し、食べ具合・体格・産子数をふまえ飼料の量を細かく加減する。食べ残しや飲水量を記録し、給与方法の改善を提案し、同僚や新人に指導できる。"},{"no":"ス-5","name":"母豚の健康観察（足・蹄・乳房・陰部の異常、足を引きずる歩き方の確認）","kanten":"足や歩き方（足を引きずらないか）、乳房（腫れ・泌乳）、陰部の異常な分泌物、飼料の食べ具合・水の出方を確認し、熱っぽければ体温を測り平熱より高くないか確かめられるか。","level1":"足を引きずる、乳房の腫れ、陰部の異常な分泌物を見ても気づかず放置する。観察すべき部位が分からず、常に指示を要する。","level2":"指示があれば足の引きずりや食べ残しには気づくが、乳房や陰部の分泌物の確認に漏れが多く、原因の究明は他者任せ。","level3":"指示があれば毎日見回り、食べ残し・下痢・元気のなさ・足を引きずる歩き方・乳房の張り・陰部の分泌物など、目に見える状態を確かめられる。","level4":"指示がなくても毎日見回り、熱っぽければ体温を測り平熱より高くないか確かめる（高ければ、分娩後なら乳房の腫れ・熱っぽさ・泌乳不良といった分娩後の体調不良、妊娠中なら疾病を疑う）。飼料の食べ具合・水の出方・泌乳の偏りの有無・足の踏ん張りまで確かめ、原因を探る処置ができる。","level5":"悪臭や膿のような陰部の分泌物、足を引きずる様子を正しく読み取り、処置・経過観察・隔離・上長への報告を自ら判断する。分娩後に排出されるはずのもの（胎盤）が残っていないか、子豚が乳を十分に吸えて育っているかまで関連づけて観察し、記録して改善し、同僚や新人に指導できる。"},{"no":"ス-6","name":"衛生管理・消毒（ストール清掃、器具消毒、防疫意識）","kanten":"ストールの清掃・糞の片づけ、種付け器具の消毒、「洗う→消毒する→乾かす」の基本の徹底、人や物の動線・病原を持ち込まない意識があるか。","level1":"清掃や消毒が不十分で、糞や食べ残しが残ったまま、器具も洗わず使い回すなど、病原を持ち込まない意識が低く、不衛生な状態を放置する。","level2":"指示があれば清掃はするが、洗う→消毒する→乾かすの手順や消毒薬の使い分けに漏れが多く、消毒の要否の判断は他者任せ。","level3":"指示があればストールの清掃・糞の片づけを行い、「洗う→消毒する→乾かす」の基本に沿って種付け器具を消毒できる。汚れの残りに気づける。","level4":"指示がなくても毎日清掃・消毒し、精液や種付けの管などの器具を清潔に扱う。汚れが残ると消毒が効きにくいことをふまえ高圧の水で十分に洗い、消毒薬の希釈やつけ置き時間を守る。","level5":"複数の消毒薬を、対象の病原や汚れの程度・温度に応じて使い分け、清潔な場所から汚れた場所への一方通行など、病原を持ち込まない動線の意味を理解する。消毒の記録（日時・薬剤・希釈・対象）を残し、手順を改善し、同僚や新人に指導できる。"},{"no":"ス-7","name":"異常の早期発見と報告（疾病・事故・発情戻りの早期察知と報連相）","kanten":"発情の再発・流産・不受胎・疾病・事故を早期に察知し、まず処置を行い、いつ・どの母豚に・どのような状態かを明確に報告・連絡・相談できるか。","level1":"発情の再発・流産・疾病・事故などの異常を見ても気づかず、報告もしないため対応が遅れる。報告すべき内容が分からず、見落としが多い。","level2":"指示があれば異常に気づくが、報告が遅く内容も不十分で、その後の判断・対応は他者任せ。","level3":"指示があれば発情の再発・食欲不振・足の引きずり・流産・陰部の分泌物などの異常を確かめ、いつ・どの母豚かを添えて上長へ報告できる。","level4":"指示がなくても毎日の見回りで異常を早期に察知し、体温の測定や患部の確認といった処置を行ったうえで、いつ・どの母豚に・どのような状態が出たかを具体的に報告する。発情の再発する母豚の増加や事故の傾向にも自ら気づく。","level5":"流産や、生まれずに固まってしまった子、発情の再発が繰り返し多いことなどから、繁殖に関わる疾病の可能性を見立て、隔離・記録・上長への報告や連携を自ら判断する。報告・連絡・相談の仕組みや確認方法を改善し、新人に指導できる。"}]},{"key":"finish","sheet":"肥育舎","scale":"業務","items":[{"no":"肥-1","name":"飼料・給餌管理（飼料切替の段取り、給餌器の調整、残飼・こぼれの管理）","kanten":"発育段階に応じた飼料の切り替えのやり方、給餌器から出る量の調整、食べ残しや床へのこぼれの確認を行えているか。","level1":"指示しても飼料の切り替えや給餌器の調整ができず、給餌器の食べ残しや床へのこぼれを放置する。発育段階の前後で飼料を取り違える、徐々に慣らさず急に切り替えて消化器の不調を招くなど、雑で危険な扱いが見られる。","level2":"言われれば給餌や食べ残しの片づけはある程度できるが、切り替えの時期や、数日かけて少しずつ混ぜながら変える手順を忘れがちで、給餌器の詰まり・出る量・床のこぼれの確認に漏れが多い。増減の判断は他者任せ。","level3":"指示があれば発育段階に応じた飼料の切り替え（育ちはじめは栄養を多めに、仕上げは控えめの飼料へ）を一通り行え、給餌器の詰まり・食べ残しの増加・床へのこぼれなど目に見える点を確認できる。","level4":"指示がなくても毎日給餌器を確認し、食べ残しが増えていれば食欲低下の原因（暑さ・体調不良・飼料の傷み）を探る。飼料の切り替えは数日かけて少しずつ混ぜながら行い、給餌器から出る量を調整してこぼれを減らす対応ができる。","level5":"飼料を与えすぎると過肥になり肉質が落ちるなど、給餌の意味を正しく理解し、食べ具合や発育に合わせて量を細かく調整する。食べ残した量や、増体に要した飼料の量を記録して改善につなげ、切り替えの手順や給餌器の調整を自ら判断して上長に報告し、同僚や新人に指導できる。"},{"no":"肥-2","name":"飲水・給水設備の管理（ニップルの点検、水量・水質の確認）","kanten":"給水器（ニップル）が正常に出るか・出る量の点検、飲水量・水温・水の清浄さを確認できているか。","level1":"給水器の点検を行わず、水の出が悪い・詰まっている状態を放置する。給水の止まった部屋や水漏れに気づかず、豚が飲水できず衰弱する・採食しなくなる事態を見落とす。","level2":"言われれば給水器を確かめるが、部屋ごと・各所の確認や出る量の点検に漏れが多く、水温や清浄さまで気が回らない。確認は指示を待ってから動く。","level3":"指示があれば個々の給水器を実際に作動させて出水を確かめ、詰まり・水漏れ・出の悪さなど目に見える不具合を確認できる。","level4":"指示がなくても毎日すべての給水器の出る量を確かめ、出が悪ければ清掃や高さの調整を行う。豚が十分に飲水できるようにし、冷たすぎずぬるすぎない水温に配慮する対応ができる。","level5":"水は体の大部分を占める最も重要な栄養と理解し、飲水量の減少を体調不良や暑さの兆候と判断する。随時水の清浄さ（汚れの有無）を調べて記録・管理し、設備の点検と水管理を自ら判断して上長に報告でき、新人に指導できる。"},{"no":"肥-3","name":"増体・発育の観察（成長のばらつき、発育不良豚の選別と対応）","kanten":"同一部屋内の体格のばらつきを把握し、発育の悪い豚・やせた豚を選び出して原因を探れているか。","level1":"発育の悪い豚や体格のばらつきに気づかず放置する。やせた豚や明らかに発育の遅れた豚を見落とし、部屋全体の発育状況を把握できない。","level2":"言われればやせた豚を選び出せるが、部屋全体のばらつきの把握や、発育の悪い豚を別室（治療部屋）へ移すことに漏れが多く、対応の判断は他者任せ。","level3":"指示があれば部屋を観察し、発育のばらつきや、明らかに発育が悪い・やせている豚を確認できる。","level4":"指示がなくても日頃から体格を観察し、発育の遅れた豚を治療部屋へ選別する。原因（体調不良・飼料の取り合い・給餌スペースの不足・群内の優劣）を探り、群の組み替えや個別管理などの対応ができる。","level5":"計画的に育成する意味を理解し、体重を測定して部屋内の体格をそろえる。出荷時期や目標体重に照らして発育の遅れの原因を調べて改善し、選別の目安を記録して上長に報告し、新人に指導できる。"},{"no":"肥-4","name":"健康観察・疾病対応（呼吸器・消化器症状、尾かじり等の早期発見と対応）","kanten":"せき・腹部を使った苦しそうな呼吸・下痢・元気のなさ・尾をかじる行動などを早めに発見し、隔離・手当て・報告といった初期対応を行えているか。","level1":"せき・下痢・尾かじりなどの兆候を見落として放置する。元気のない豚や衰弱した豚に気づかず、手遅れを招く危険な見落としがある。","level2":"言われれば不調の豚を見つけられるが、せきの頻度・下痢便の様子・体の傷など個体ごとの確認に漏れが多く、隔離・手当て・報告の判断は他者任せ。","level3":"指示があればせき・くしゃみ・腹部を使った苦しそうな呼吸・下痢・採食しない・元気がない・尾をかじられた傷など、目に見える兆候を確認できる。","level4":"指示がなくても毎日見回り、発熱が疑われれば体温を測って平熱より高くないか確かめる。安静時の呼吸が普段より速いことや腹部を使った呼吸を異常の兆候ととらえ、不調の豚を別室（治療部屋）へ移して個別管理する対応ができる。","level5":"兆候を正しく読み取り（せきの継続・血の混じった便など）、手当て・経過観察・隔離・上長への報告を自ら判断する。尾かじりは加害個体を特定して分け、環境要因（換気不足・過密・飼料不足）を是正する。観察結果を記録し、新人に指導できる。"},{"no":"肥-5","name":"出荷管理（出荷適期の判断、体重測定、選別・積込の段取り）","kanten":"出荷適期の見きわめ・体重測定、出荷前の絶食の段取りや、薬剤使用後に出荷を控える期間の確認、豚を落ち着いて選別・積み込む扱いができているか。","level1":"出荷の頃合いを見きわめられず、体重も測らずに規格に合わない豚を出荷する。乱暴に追い立てたり電気棒を多用したりして豚を傷つける危険な扱いがある。","level2":"言われれば選別や積み込みを手伝えるが、体重の確認・薬剤使用後に出荷を控える期間・出荷前の絶食の段取りに漏れが多く、頃合いや除外の判断は他者任せ。","level3":"指示があれば体重測定と外観の確認で出荷適期の豚を選び、けがや疾病のある豚を除外できる。","level4":"指示がなくても出荷前に所定の時間飼料を止め（水は自由に飲ませる）、薬剤使用後に出荷を控える期間を確認する。追い板で少しずつ静かに追い、電気棒を避け、ゆるやかな傾斜の通路で誘導する対応ができる。","level5":"肉質を落とさないことや、薬剤使用後の期間を確実に守る意味を理解して計画的に出荷する。耳標番号・投薬記録・体重を出荷リストで管理・記録し、季節への配慮（夏は早朝・散水、過密を避けた積み込み）まで判断して、上長に報告し新人に指導できる。"},{"no":"肥-6","name":"衛生管理・消毒（豚房清掃、オールイン・オールアウト、防疫意識）","kanten":"洗浄・消毒の手順を守れているか、豚を全頭出して洗浄・消毒し、空けてからまとめて入れ替えるやり方での空け期間、作業動線と病原を持ち込まない意識があるか。","level1":"部屋の清掃や消毒の手順を理解しておらず、ふん尿・飼料の食べ残しなどの汚れを残したまま消毒剤をまく。空け期間を守らずに豚を入れるなど、病原を持ち込まない意識がない。","level2":"言われれば清掃するが、つけ置き・高圧洗浄・乾燥の各工程や、消毒剤の希釈・接触時間を守ることに漏れが多く、汚れの取り残しがある。","level3":"指示があれば「ふんを取る→洗う→消毒する」の基本手順で部屋を清掃し、汚れの残りなど目に見える点を確認できる。","level4":"指示がなくても一連の手順（ふんを取る→粗洗い→つけ置き→高圧洗浄→乾燥→消毒→乾燥）を行い、消毒の前に汚れをしっかり落とす。豚を全頭出して洗浄・消毒し、空け期間を十分にとってまとめて入れ替えるやり方を守り、作業は清浄な所から汚れた所への一方通行で動く。","level5":"洗浄してから消毒し乾燥させる基本と、消毒剤の性質（汚れが残ると効かなくなる等）を理解し、対象の病原に応じて消毒剤を選ぶ。洗浄の仕上がりを確かめて効果を見極め、消毒の記録（日時・薬剤・希釈濃度・消毒箇所）を残して改善し、新人に指導できる。"},{"no":"肥-7","name":"環境管理（温度・湿度・換気・飼養密度の調整）","kanten":"定めた温度・湿り具合（湿度）を保つこと、換気量や空気の汚れ（鼻をつくにおい）、過密の度合い（飼養頭数）の調整を行えているか。","level1":"温度計や鼻をつくにおいに気を配らず、暑さ・寒さ・過密・換気の悪さを放置する。豚が固まって寄り集まったり、苦しそうに浅く速い呼吸をしていても気づかず対応できない。","level2":"言われれば温度計を確認するが、換気の調整・過密の度合い・空気の汚れの確認に漏れが多く、調整の判断は他者任せ。","level3":"指示があれば温度計を確認し、体が小さい時期は高め・出荷体重に近づくほど低めという目安で温度を保ち、過密や換気の悪さなど目に見える点を確認できる。","level4":"指示がなくても温度・湿り具合・換気を毎日調整し、安静時の呼吸が普段より速いことや鼻をつくにおいを感じ取って換気を強める。過密にならない頭数を守り、暑い時は散水・送風を合わせて行う対応ができる。","level5":"暑いと採食量が落ちて発育が鈍る等の意味や、蒸し暑さが増した時に対策を強める必要を理解して環境を細かく調整する。季節に合わせて換気の最小と最大を見据えて管理し、記録して改善し、上長に報告して新人に指導できる。"}]},{"key":"nursery","sheet":"子豚舎（離乳舎）","scale":"業務","items":[{"no":"子-1","name":"離乳豚の導入・馴致（移動時のストレス軽減、給餌・給水への誘導）","kanten":"移動直後の子豚をよく観察し、飼料と水の場所まで誘導し、体格をそろえた群分けができるか。","level1":"指示があっても子豚を乱暴に追い立て、飼料や水の場所を教えずに放置する。母豚からの分離・飼料の変化・移動・群の組み替えといった負担が重なることを理解しておらず、隅でうずくまる子豚や水を飲めていない子豚に気づかない。","level2":"指示があれば水飲み口に口を当てて飲み方を教えるが、抜けが多い。体格の異なる子豚を同じ群に混ぜてしまい、はじかれて弱る子豚が出ても気づかない。誘導が適切かどうかの判断は他者任せ。","level3":"指示があれば静かに追い込み、水飲み口と飼料箱の場所まで子豚を誘導し、体格の近い子豚同士で適切な規模の群を編成できる。どの子豚も無理なく採食できる飼料箱の幅を確保し、飼料や水に近づかない子豚を目視で確認できる。","level4":"指示がなくても、導入後しばらくは採食しない子豚を重点的に観察し、水でふやかした飼料や手からの給餌で立ち上げる。群を混ぜる際は夕方の暗い時間帯に行って争いを抑え、各水飲み口の出方・水量・高さまで自ら点検し、うずくまりや水分不足の兆候を探って早めに対処する。","level5":"離乳時の発育状態を目安に立ち上がりの良否を見分け、弱い子豚の別飼い・群の組み替え・記録まで自ら判断する。導入後に衰弱する子豚を減らす誘導法や群分けの工夫を提案し、追い込みや飼料・水への誘導のやり方を新人に指導できる。"},{"no":"子-2","name":"飼料・給餌管理（離乳食の切替、少量多回給与、食い込みの確認）","kanten":"離乳用の飼料を段階的に分け、少量を複数回に分けて給与し、豚房ごと・個体ごとの採食状況を確認できるか。","level1":"指示があっても飼料を一度に大量に与え、古い飼料の残りや傷み・カビに気づかない。離乳直後に急に次段階の飼料へ切り替えるなど順序を無視し、消化器の不調や下痢を生じさせる。","level2":"指示があれば少量ずつ与えるが回数や量が安定せず、初期の飼料から次の飼料へ急に切り替えて消化器の不調を生じさせる。個体ごと・豚房ごとの採食状況の差に気づけず、判断は他者任せ。","level3":"指示に従い、消化のよい離乳用飼料を少量ずつ複数回に分けて与え、数日かけて混ぜながら段階を進められる。飼料箱の食べ残しや飼料の汚れを確認し、採食状況の悪い豚房を目視で把握できる。","level4":"指示がなくても毎回の採食状況を観察し、採食しない子豚には手からの給餌や水でふやかすなどで対応する。発育に合わせて飼料の栄養を段階的に下げる切り替えを意識して時期を見極め、採食量が落ちれば飼料の鮮度・水の出・温度・体調まで原因を探る。","level5":"採食量が減った際、その原因が疾病か・暑熱や寒冷など環境か・飼料の質かを切り分け、給与量・回数・飼料の段階を自ら少しずつ調整する。離乳後の下痢を抑える給与法を提案し、少量多回給与のコツや段階の進め方を記録に基づき新人に指導できる。"},{"no":"子-3","name":"飲水管理（給水器の高さ・水量、脱水の防止）","kanten":"水飲み口の高さ・水量・出方を点検し、子豚が飲水できているか・水分が足りているかを確認できるか。","level1":"指示があっても水飲み口から水が出ているか確かめず、詰まりや高さの不適合で飲めない状態を放置する。水分不足でうずくまる子豚に気づかない。","level2":"指示があれば水飲み口を触って確かめるが、高さの調整や水量の確認はせず、飲水できていない豚房や水分不足の兆候を見落としやすい。","level3":"指示があれば水飲み口の高さを子豚の肩の位置に合わせ、水の出方や詰まりを点検できる。眼の落ちくぼみ・皮膚をつまんでも戻りが遅いなど、水分不足の兆候を目視で確認できる。","level4":"指示がなくても毎日すべての水飲み口で水が出るか・スムーズに出るか・出が悪くないかを確かめ、下痢が出た際は水分と塩分の補給を意識する。飲水量の低下に気づけば水の温度・勢い・詰まりまで原因を探る。","level5":"下痢や暑熱で水分が不足する危険を見極め、塩分の追加や水飲み口の増設・高さの調整といった対応を自ら判断して行う。水の清浄さや出水量の点検を記録して改善につなげ、飲水管理の要点を新人に指導できる。"},{"no":"子-4","name":"子豚の健康観察（下痢・呼吸器症状・削痩の早期発見）","kanten":"糞・呼吸・活力・体つきを観察し、下痢・咳や苦しそうな呼吸・やせを早期に発見し対処できるか。","level1":"指示があっても豚房を素通りし、下痢の糞や咳・腹を使った苦しそうな呼吸、やせた子豚を見落とす。気づいた異常も別飼いや連絡といった対処につなげられない。","level2":"指示があれば、明らかな下痢や活力の低下には気づくが、軽い咳・くしゃみや発育の遅れ・やせ始めなど初期の兆候は見落としやすく、対処の判断は他者任せ。","level3":"指示があれば毎日各豚房を観察し、水様の下痢・血の混じった下痢、咳・くしゃみ・鼻水、やせ・毛づやの悪さ・うずくまりなど目に見える状態を確認できる。離乳後しばらくは下痢が生じやすい時期だと理解している。","level4":"指示がなくても毎日すべての豚房を観察し、発熱が疑われれば体温を測定し平熱より高くないかで原因を探る。呼吸が速く荒くないか・糞の状態・飼料と水の摂取状況まで確認し、下痢の子豚は早めに別の豚房（手当て用）へ移す対処ができる。","level5":"観察した状態から疾病の見当をつけ（離乳後に下痢を起こす疾病や、咳・呼吸の疾病などを想定し）、治療・経過観察・別飼い・上長への報告まで自ら判断する。いつ・どのような状態が現れたかを記録して見直し、次の予防に役立て、観察の着眼点を新人に指導できる。"},{"no":"子-5","name":"発育不良豚のケア（はじかれ豚の管理、群分け・別飼いの対応）","kanten":"群に入れず採食できない子豚や発育の悪い子豚を見分け、適切な時期に群分け・別飼いを行い個別に世話できるか。","level1":"指示があっても発育の悪い子豚やはじかれた子豚を群に放置し、採食できず衰弱していくのを見過ごす。","level2":"指示があれば弱い子豚を別の豚房へ移すが、抜き出すのが遅く、やせが進んでから手を打つ。群分けの目安があいまいで、判断は他者任せ。","level3":"指示があれば体格の近い子豚同士で群をそろえ、はじかれて採食できない子豚や、やせ・毛づやの悪い発育不良の子豚を見分け、別飼い用の手当て豚房へ移して個別に世話できる。","level4":"指示がなくても日々、はじかれた子豚を早めに抜き出し、消化のよい飼料・手からの給餌・十分な保温など立て直しの世話を行う。回復の度合いを体格や採食状況で確かめ、原因（疾病・歯・群内の力関係）まで探る。","level5":"発育不良の原因を疾病・飼料・環境から切り分け、別飼い・投薬・経過観察・淘汰の判断を自ら行う。はじかれる子豚が出ないよう群編成や給与法で減らす工夫を提案し、立て直しの世話を新人に指導できる。"},{"no":"子-6","name":"環境管理（保温、温度ムラ・すきま風の防止、換気）","kanten":"舎内の温度・床の温度・すきま風・換気（鼻をつくにおいがこもっていないか）を点検し、子豚の様子から適温を保てるか。","level1":"指示があっても温度計を確認せず、寒さで折り重なってうずくまる、あるいは暑さでばらばらに伏せる子豚の様子を放置する。すきま風や換気の不良に気づかない。","level2":"指示があれば保温電球や換気を調整するが、適温の根拠があいまいで、温度ムラ・すきま風・鼻をつくにおいを見落としやすい。","level3":"指示があれば離乳直後の適温を目安に温度計を確認し、保温電球や床暖房で加温し、すきま風を防げる。子豚の伏せ方（折り重なる＝寒い、手足を伸ばして散らばる＝暑い）から体感温度を読める。","level4":"指示がなくても発育に合わせて段階的に設定温度を下げ、床を気温より暖かく保つ。鼻をつくにおいがこもらないよう換気とすきま風対策を両立させ、温度ムラの原因（すきま・送風機・敷きわら）を探って対処する。","level5":"発育の週齢に応じた適温の推移や、最低限必要な換気の意味を理解し、保温・換気・飼養密度を季節に合わせて段階的に調整する。子豚の様子から環境を読み取って改善・記録し、温度ムラやすきま風の対策を新人に指導できる。"},{"no":"子-7","name":"衛生管理・消毒（豚房清掃、オールイン・オールアウト、防疫意識）","kanten":"糞の除去→洗浄→乾燥→消毒の順序と、豚をまとめて入れ替えて洗浄・消毒する方式、作業者の動線・病原を持ち込まない意識を守れるか。","level1":"指示があっても糞を残したまま消毒液を散布する、空舎期間を取らずに次の群を入れるなど順序を無視し、糞や汚れが残ると消毒が効かないことを理解していない。","level2":"指示があれば洗浄・消毒はするが、乾燥・つけ置きの手順を省き、消毒液の希釈や空舎期間を守れないことが多い。作業者の動線や手指消毒への意識が薄い。","level3":"指示があれば、糞の除去→洗浄→乾燥→消毒の順で豚房を清掃し、豚をまとめて入れ替える方式で群を一斉に入れ替えられる。消毒液の希釈を守り、長靴や手指の消毒もできる。","level4":"指示がなくても、糞や汚れを十分に除去し、空舎期間を十分にとって洗浄・消毒・乾燥まで終わらせる。清浄な子豚舎から汚染区域への一方通行を守り、消毒液を対象に応じて選び、効くまでの時間を確保する。","level5":"「洗浄→消毒→乾燥」の重要性や、消毒液には汚れがあると効かないもの・効きにくい対象があることを理解し、薬剤や濃度を選べる。豚をまとめて入れ替える方式で疾病の持ち越しを断ち、消毒の記録や効果の確認で改善し、病原を持ち込まない手順を新人に指導できる。"}]},{"key":"attitude","sheet":"仕事への姿勢（全舎共通）","scale":"姿勢","items":[{"no":"仕-1","name":"時間厳守・出勤態度（始業前準備、遅刻欠勤、身だしなみ）","kanten":"始業時刻より前に出勤して準備を整えているか。長靴の消毒・専用作業着への着替え・手指の消毒など、病原の持ち込みを防ぐための手順を実行しているか。遅刻・欠勤の際に事前連絡をするか。爪・髪・服装が清潔か。あわせて、指示を待たず自ら動けているか、周囲へ声をかけているかを見る。","level1":"始業時刻に遅れることが多く、連絡のない遅刻・欠勤がある。長靴の消毒や専用作業着への着替えを怠り、その都度指示されなければ、病原の持ち込みを防ぐ手順や身だしなみを整えられない。","level2":"ぎりぎりの出勤や連絡漏れが時折あるが、注意されれば始業より早めに出勤し、作業着への着替え・長靴の消毒・手指の消毒を行う。身だしなみの乱れも、指摘されれば直す。","level3":"指示どおり始業時刻より前に出勤し、長靴の消毒・専用作業着への着替え・手指の消毒という手順を一通り実行できる。遅刻・欠勤の際は、始業前に自ら連絡できる。","level4":"指示がなくても始業より余裕をもって早めに出勤し、その日の段取りや道具・記録用紙を整える。長靴の消毒や着替えを毎回欠かさないなど、病原の持ち込みを防ごうとする意識が言動に表れている。体調不良の際も早めに連絡し、代替の対応を申し出る。","level5":"自ら進んで早めの準備や消毒（消毒液の汚れ・濁りを確認して入れ替える等）を行い、遅れがちな同僚や新人へ、出勤時刻・身だしなみ・消毒手順を具体的に助言する。職場全体の出勤規律と衛生意識を高めている。"},{"no":"仕-2","name":"報連相とチームワーク（情報共有、協力姿勢、引き継ぎの正確さ）","kanten":"体調の異常（発熱の様子・飼料を食べない・死亡・分娩の兆候・豚の脱柵 など）を、いかに早くもれなく上長や仲間へ伝え、相談しているか。引き継ぎノートや日報に、頭数・豚房・状態・実施した処置を正しく記録できているか。手が空いた際に手伝う姿勢があるか。指示を待たず動けるか、周囲へ働きかけているかを見る。","level1":"発熱の様子・飼料を食べない・死亡といった異常を見ても伝えず、自分で抱え込み、引き継ぎの漏れが多い。その都度確認して指示しなければ、情報を共有しない。","level2":"報告漏れや引き継ぎの抜けが時折あるが、指示されれば日報や引き継ぎノートに、頭数・豚房の番号・状態・実施した処置を記録して共有できる。","level3":"指示された事項（処置した豚の頭数・使用した薬剤の名称と残量・残っている作業・注意して観察すべき豚）について一通り報告・連絡・相談ができ、引き継ぎノートに記録して次の担当者へ引き渡せる。","level4":"指示がなくても気づいた異常をその場で伝えて相談し、引き継ぎの内容（投薬中の豚房・薬を止めてから出荷までの待機期間・注意して観察する豚 など）を、相手に伝わる形で正しく残そうとする姿勢が言動に表れている。手が空けば、忙しい同僚を自ら手伝う。","level5":"引き継ぎの書き方や報告の優先順位（緊急か通常か）を仲間とそろえるよう働きかけ、新人へ、伝えるべき異常の見分け方や記録の書き方を指導する。職場の情報共有とチーム連携の質を底上げしている。"},{"no":"仕-3","name":"改善意識・学習姿勢（提案、振り返り、新しい知識の習得意欲）","kanten":"その日の作業を振り返って改善を提案するか。疑問点を確認するか。新しい知識（飼養管理・疾病・薬剤・衛生）を学ぼうとするか。指示を待たず動けるか、提案が具体的で観察できる事実にもとづくか、周囲へ広げているかを見る。","level1":"指示された作業をこなすだけで振り返りも疑問もなく、失敗しても原因を考えない。その都度促されなければ学ぼうとしない。","level2":"改善の気づきが時折あるが自らは動かず、指示されれば手順を見直したり、分からない用語（分娩後の体調不良・離乳に適した時期・薬を止めてから出荷までの待機期間 など）を確認したりする。","level3":"指示された範囲でその日の作業を振り返って疑問を質問し、教わった手順や目安（分娩室の適切な室温・薬剤の希釈方法 など）を覚えて次に活かそうとする。","level4":"指示がなくても作業の無駄や危険な箇所（人や豚の動線・転倒のしやすさ・薬剤の取り違え など）に気づいて改善案を出し、研修資料やマニュアルを自ら読み込むなど、学ぼうとする姿勢が言動から分かる。","level5":"試した改善を、観察できる結果（事故の発生しやすさ・離乳できた頭数・発育の状態・作業にかかった時間 など）で振り返ってチームに提案・共有し、新しい知識ややり方を勉強会などで同僚へ広め、職場の作業手順の見直しにつなげている。"}]}]</script>
<script id="workCriteriaData" type="application/json">{"levelLabels":["要指導","要改善","標準","上回る","模範的"],"commonAspects":[{"id":"care","name":"丁寧さ・確実さ","kanten":"{work}を手順どおり丁寧に、やり残しや不備なく確実に行えるか。仕上がりを自分で確かめられるか。","levels":["{work}を雑に済ませ、やり残しや不備があっても気づかず放置する。指示されなければ正しく行えない。","指示があれば{work}をひと通り行えるが、手順の抜けや仕上がりのムラが多く、確実にできたかの確認は他者まかせ。","指示があれば{work}を手順どおり丁寧に行い、やり残しや不備に自分で気づける。","指示がなくても{work}を確実に行い、仕上がりを自分で確かめて、不備があればその場で直す。","{work}の要点とミスの起きやすい箇所を理解し、常に安定した品質で行い、丁寧で確実なやり方を新人に指導できる。"]},{"id":"time","name":"時間内の遂行","kanten":"{work}を決められた時間の目安内に、段取りよく終えられるか。","levels":["{work}に時間がかかりすぎ、時間内に終わらない。段取りを考えず、遅れても気にしない。","指示があれば取りかかるが、段取りが悪く時間内に終わらないことが多い。","指示された時間の目安を守って{work}を進められる。","指示がなくても優先順位と段取りを考え、{work}を余裕をもって時間内に終える。","{work}全体の段取りを組んで無駄を省き、時間内に終える工夫を新人に教えられる。"]},{"id":"tools","name":"器具・設備の扱い","kanten":"{work}で使う器具・設備を正しく清潔に扱い、使用後の洗浄・消毒・点検・片づけができるか。","levels":["{work}で使う器具・設備を乱暴に扱い、汚れや破損・消毒忘れがあっても気にしない。","指示があれば器具を使えるが、消毒や後片づけ・点検に抜けが多い。","指示があれば器具・設備を正しく使い、使用後の洗浄・消毒・片づけができる。","指示がなくても器具を清潔・適切に扱い、不具合や消耗に気づけば手入れ・報告する。","器具・設備の扱いと管理の要点を理解し、正しい扱い方を新人に指導できる。"]},{"id":"report","name":"報告・記録","kanten":"{work}の結果・数値・気づいた異常を、上長へ報告し、記録に残せるか。","levels":["{work}の結果や気づいた異常を報告せず、記録も残さない。","指示されれば報告・記録するが、内容が不十分で抜け漏れが多い。","指示された事項について{work}の結果・数値・異常を報告し、記録に残せる。","指示がなくても{work}で気づいた異常や引き継ぎ事項を、相手に伝わる形で報告・記録する。","報告・記録の要点や優先順位を判断し、伝えるべき異常の見分け方と記録の書き方を新人に指導できる。"]},{"id":"observe","name":"作業外の観察（豚の異常察知）","kanten":"{work}をしながらも豚全体へ目を配り、発熱・食欲・行動の変化などの異常を早期に察知できるか。","levels":["{work}に気を取られ、豚の様子や周囲の異常に気づかない。","指示されれば豚を見るが、{work}中の異常（発熱・食欲・行動の変化など）を見落としがち。","{work}をしながら豚の目に見える異常に気づき、確かめられる。","{work}中も自然に豚全体へ目を配り、異常の兆候を早期に察知して初期対応・報告できる。","{work}と並行した観察の着眼点を理解し、異常の早期発見のコツを新人に指導できる。"]}],"categories":[{"id":"feeding","name":"飼養管理"},{"id":"hygiene","name":"衛生管理"},{"id":"breeding","name":"繁殖管理"},{"id":"farrowing","name":"分娩管理"},{"id":"facility","name":"施設管理"},{"id":"record","name":"記録管理"},{"id":"shipping","name":"出荷管理"}],"works":[{"id":"feeding-daily","category":"feeding","no":"No.11","name":"給餌","purposeShort":"成長・繁殖を安定させ、全頭がムラなく食べ、ムダな飼料を出さない","aspects":[{"id":"amount","name":"給与量の管理と個体・季節調整","kanten":"決められた給与量を守りつつ、豚の状態や季節に応じて過不足なく調整できるか。","levels":["決められた量を守らず目分量で与え、豚の状態や季節の違いを考えずに一律に給餌する。","指示があれば決められた量を与えられるが、季節や個体差に応じた調整は他者まかせで、過不足が出やすい。","指示があれば決められた量を守り、暑い時期や豚の状態に応じてある程度の増減ができる。","指示がなくても食い込みや季節を見て量を細かく加減し、食下量の低下があれば原因を探って対応する。","給与量が成長・繁殖に与える影響を理解し、体況・季節・ステージに合わせて最適化し、調整の考え方を新人に指導できる。"]},{"id":"residue-water","name":"残餌と給水の確認","kanten":"残餌の有無・変質と、給水器の流量を毎回確認し、飲水不足や飼料ロスを防げるか。","levels":["残餌や給水器の不具合を確認せず、飼料ロスや飲水不足を放置する。高温期の変質・カビにも気づかない。","指示があれば残餌を片づけるが、給水器の流量確認や槽内飼料の傷みの点検に漏れが多い。","指示があれば残餌を確認して片づけ、給水器から水が出ているかを確かめられる。","指示がなくても毎回残餌の量と傷みを確かめ、給水器の流量を点検し、飲水不足による食い込み低下を防ぐ。","残餌量・飲水量を給餌量の見直しに結びつけ、高温期の変質対策まで判断し、確認の要点を新人に指導できる。"]}]},{"id":"feed-adjust","category":"feeding","no":"No.02","name":"エサ調整","purposeShort":"BCS・生理ステージに応じて栄養過不足を防ぎ、繁殖成績を高める","aspects":[{"id":"stage-timing","name":"ステージ・時期に合わせた調整","kanten":"妊娠・泌乳などの生理ステージと正しい時期を見て、適切な段階で給与を変えられるか。","levels":["ステージや時期を考えず、いつも同じ与え方をする。切り替えの時期を外しても気にしない。","指示があれば切り替えられるが、ステージ移行の時期が遅れがちで、判断は他者まかせ。","指示があれば生理ステージに応じた時期にエサ量を切り替えられる。","指示がなくてもステージの移行を見越して適切な時期に調整し、増量中は餌残しに注意する。","不適切な時期の調整が逆効果になることを理解し、ステージごとに最適な時期と量を判断し、新人に指導できる。"]},{"id":"individual","name":"個体差・体重に応じた加減","kanten":"体重やBCSを見て一頭ごとに給与を加減し、日齢だけで一律に判断しないか。","levels":["個体差を見ずに全頭一律に与え、痩せ・過肥があっても気づかない。","指示があれば極端な個体には対応するが、体重を確かめず日齢だけで切り替えることが多い。","指示があれば体重やBCSを確かめ、痩せ・過肥の個体を見分けられる。","指示がなくても一頭ごとに体重・BCSを見て給与量を加減し、痩せすぎ・太りすぎを防ぐ。","体重・BCS・産次を総合して細かく最適化し、個体に応じた加減の目安を新人に指導できる。"]}]},{"id":"feed-adjust-detail","category":"feeding","no":"No.38","name":"エサ調整（詳細）","purposeShort":"体重・BCS・産次を見て調整し、痩せ・過肥を防ぎ農場目標に合わせる","aspects":[{"id":"gradual","name":"段階的な増減","kanten":"エサ量を急に変えず少しずつ増減し、急な変化による食欲低下を防げるか。","levels":["エサ量を一気に増減し、食欲低下を招いても気にしない。","指示があれば増減するが、変化幅が大きく食欲を落とすことがある。","指示があればエサ量を少しずつ増減できる。","指示がなくても食い込みを見ながら段階的に増減し、急な変化を避ける。","急な増減が消化器や食欲に与える影響を理解し、段階的な調整幅を判断して新人に指導できる。"]},{"id":"parity-season","name":"産次・季節への配慮","kanten":"産次の違いや夏季の食い込み低下を考え、量だけでなく回数や時間帯でも対応できるか。","levels":["産次の違いや季節を無視して与え、夏季の食い込み低下を量の増加だけで対応し残餌を増やす。","指示があれば産次や季節をある程度考えるが、多産系母豚の泌乳量増大への対応に漏れが多い。","指示があれば産次や季節を考えて量を調整できる。","指示がなくても産次差・多産系の泌乳量を考え、夏季は給与時間や回数を工夫して食下量を確保する。","産次・泌乳量・季節を総合して給与設計を最適化し、残餌を抑える工夫を新人に指導できる。"]}]},{"id":"feed-recovery","category":"feeding","no":"No.16","name":"エサ回収","purposeShort":"病気・腐敗リスクを減らし飼料コストを削減し、給餌量見直しに役立てる","aspects":[{"id":"spoilage","name":"変質餌の見分けと短時間回収","kanten":"カビ・腐敗した残餌を再利用せず、回収・保管を短時間で行い変質を防げるか。","levels":["カビや腐敗した残餌を再利用し、回収後も常温で長時間放置して変質させる。","指示があれば回収するが、変質の見分けが甘く、放置時間が長くなりがち。","指示があればカビ・腐敗した残餌を見分けて分け、短時間で回収できる。","指示がなくても変質を見分けて再利用せず、回収・保管を短時間で済ませる。","変質が病気・腐敗リスクにつながることを理解し、回収の手順を最適化して新人に指導できる。"]},{"id":"dedicated-tools","name":"専用容器・器具の管理","kanten":"回収用の容器・器具を専用にして洗い、他用途転用や豚房間共用による交差汚染を防げるか。","levels":["他用途のバケツを転用し、器具を豚房間で使い回して交差汚染・病原伝播を招く。","指示があれば専用容器を使うが、洗浄や豚房ごとの使い分けに漏れがある。","指示があれば回収用の専用容器・器具を使い、使用後に洗える。","指示がなくても専用容器を清潔に保ち、豚房間の共用を避けて交差汚染を防ぐ。","交差汚染・病原伝播の仕組みを理解し、容器・器具の管理ルールを新人に指導できる。"]}]},{"id":"nursing-feed","category":"feeding","no":"No.43","name":"えつけ（哺乳期給餌）","purposeShort":"泌乳量を確保し、子豚の離乳頭数・体重を高め、母豚の削痩を防ぐ","aspects":[{"id":"gradual-lactation","name":"分娩後の段階的増給と暑熱対応","kanten":"分娩後は少量から段階的に増やし、暑熱時は回数を増やして食下量を確保できるか。","levels":["分娩後にいきなり多く与える、または暑熱時に回数を増やさず食下量を落とす。","指示があれば段階的に増やすが、暑熱時の回数調整や水の確保に漏れがある。","指示があれば分娩後は少量から段階的に増やし、水が飲める状態を保てる。","指示がなくても食い込みを見て段階的に増やし、暑熱時は回数を増やして食下量を確保する。","泌乳量と母豚の削痩・次回繁殖の関係を理解し、給餌設計を最適化して新人に指導できる。"]},{"id":"colostrum-balance","name":"産子数と乳頭数のバランス管理","kanten":"産子数と乳頭数の差を確認し、初乳未摂取子豚や泌乳不全乳頭を見落とさず対応できるか。","levels":["産子数と乳頭数の差を確認せず、初乳を飲めない子豚や泌乳不全の乳頭を放置する。","指示があれば確認するが、分割授乳や弱い子豚の固定に漏れが多い。","指示があれば産子数と乳頭数の差を確かめ、初乳を飲めていない子豚に気づける。","指示がなくても分割授乳を行い、泌乳不全乳頭や発育格差に気づいて弱い子豚を手当てする。","初乳・泌乳と発育格差の関係を理解し、里子や分割授乳の判断を最適化して新人に指導できる。"]}]},{"id":"grow-handover","category":"feeding","no":"No.27","name":"育成受け","purposeShort":"育成管理への引き継ぎを確実に行う","aspects":[{"id":"info-handover","name":"個体情報の引き継ぎ","kanten":"個体情報を漏れなく伝え、受入れ先が管理を継続できる形で引き継げるか。","levels":["個体情報を伝えず、引き継ぎ漏れがあっても気にしない。","指示されれば伝えるが、内容が不十分で伝達漏れが多い。","指示された個体情報をひと通り伝えて引き継げる。","指示がなくても必要な個体情報を整理し、受入れ先に伝わる形で引き継ぐ。","引き継ぎで漏れやすい情報を把握し、確実な引き継ぎの方法を新人に指導できる。"]},{"id":"receiving-env","name":"受入れ環境の事前確認と初期観察","kanten":"受入れ先の水・エサ・温度・群密度を事前に整え、受入後数日の採食・飲水を確認できるか。","levels":["洗浄・消毒や空舎期間を省き、前ロットのままの温度・換気で受け入れ、群密度過多も見落とす。","指示があれば環境を確認するが、受入後の採食・飲水の確認に漏れが多い。","指示があれば受入れ先の水・エサ・温度を事前に確かめられる。","指示がなくても洗浄・消毒・空舎期間をとり、群密度と受入後3日間の採食・飲水を確認する。","病原体持ち越しや群密度過多のリスクを理解し、受入れ環境づくりを最適化して新人に指導できる。"]}]},{"id":"castration","category":"feeding","no":"No.34","name":"去勢","purposeShort":"雄臭のない豚肉を生産し、ケンカ・乗駕を減らし、群管理を安全にする","aspects":[{"id":"age-method","name":"日齢・方法の遵守と短時間実施","kanten":"決められた日齢・方法で、子豚に無理をさせず短時間で去勢できるか。","levels":["日齢や方法を守らず、生後7日を過ぎてから雑に行い、子豚に長く無理をさせる。","指示があれば実施できるが、日齢の判断や手早さに欠け、ストレスをかけがち。","指示があれば決められた日齢・方法でひと通り去勢できる。","指示がなくても適期を見て短時間で行い、子豚への負担を抑える。","日齢超過がストレス・出血を増やすことを理解し、適期と手技を新人に指導できる。"]},{"id":"asepsis-aftercare","name":"清潔な器具と術後の確認","kanten":"器具を1頭ごとに消毒し、術後の切り口の処置と出血・腫れ・元気の確認ができるか。","levels":["器具を1頭ごとに消毒せず使い回し、術後の切り口処置や観察を怠り腹膜炎・感染を招く。","指示があれば消毒するが、術後の消毒薬塗布や観察に漏れが多い。","指示があれば清潔な器具を使い、術後の出血・腫れ・元気をひと通り確認できる。","指示がなくても1頭ごとに器具を消毒し、切り口を処置して術後の観察頻度を増やす。","感染・合併症の仕組みを理解し、無菌操作と術後管理を新人に指導できる。"]}]},{"id":"additive","category":"feeding","no":"No.18","name":"添加剤準備","purposeShort":"添加剤の効果をムラなく出し、豚の健康・成績を安定させる","aspects":[{"id":"dosage-mix","name":"正確な計量と混合","kanten":"ラベルの対象・添加量を守り、正確に計量してムラなく混合できるか。","levels":["計量器を確かめず目分量で入れ、混合手順を省いてムラを出す。","指示があれば計量するが、計量器の校正やプレミックス手順に漏れがある。","指示があればラベルの添加量に従って計量し、ひと通り混合できる。","指示がなくても計量器を確かめて正確に計り、プレミックスでムラなく混合する。","計量誤差・混合ムラが成績に与える影響を理解し、正確な準備手順を新人に指導できる。"]},{"id":"antibacterial","name":"抗菌性添加物の重複・休薬管理","kanten":"抗菌性添加物の重なりに注意し、給与期間の終了・休薬を記録で管理できるか。","levels":["抗菌性添加物の重なりや給与期間の終了を確認せず、残留リスクを招く。","指示があれば注意するが、複数添加剤の残存や期間管理に漏れが多い。","指示があれば抗菌性添加物の重なりに注意し、休薬のあるものを記録できる。","指示がなくても給与期間の終了を管理し、容器内残存による混在を避ける。","残留リスクと休薬の意味を理解し、抗菌性添加物の管理ルールを新人に指導できる。"]}]},{"id":"dung-removal","category":"hygiene","no":"No.12","name":"除フン","purposeShort":"病気・有害ガスを減らし豚の健康を守り、糞から異常を早期発見する","aspects":[{"id":"order","name":"除糞→洗浄→消毒の順序","kanten":"先に糞を取り除いてから洗浄・消毒する順序を守り、汚れの上から消毒しないか。","levels":["汚れが残ったまま消毒し、順序を守らず効果を半減させても気にしない。","指示があれば糞を取るが、洗浄・消毒の順序や仕上がりの確認に漏れが多い。","指示があれば先に糞を取り、その後に洗浄・消毒する順序をひと通り守れる。","指示がなくても順序を守り、汚れが残ると消毒が効かないことを踏まえて確実に除糞する。","汚れと消毒効果の関係を理解し、決められた頻度・タイミングと順序を新人に指導できる。"]},{"id":"underfloor","name":"床下・ピット・残渣の確認","kanten":"床下やピットまで定期的に確認し、スクレーパー動作後の残渣を目視で確かめられるか。","levels":["床下・ピットを確認せず、スクレーパー後の残渣も見ずに次工程へ進む。","指示があれば見えるところは確認するが、床下・ピットの点検に漏れが多い。","指示があれば床下やピットをひと通り確認できる。","指示がなくても床下・ピットを定期的に確認し、スクレーパー後の残渣を目視で確かめる。","残渣滞留のリスクを理解し、見落としやすい箇所の点検を新人に指導できる。"]}]},{"id":"five-s","category":"hygiene","no":"No.31","name":"5S清掃","purposeShort":"衛生レベルを底上げし、作業をやりやすくし、設備トラブルを早く見つける","aspects":[{"id":"fixed-place","name":"定位置管理の徹底","kanten":"物の置き場所を決めて守り、使った物を元の場所に戻せるか。","levels":["置き場所を決めず、使った物を元に戻さないまま放置する。","指示があれば片づけるが、元の場所に戻さないことが多い。","指示があれば決められた置き場所に物を戻せる。","指示がなくても定位置を守り、乱れがあれば自分で整える。","定位置管理がミス削減につながることを理解し、置き場所のルールづくりを新人に指導できる。"]},{"id":"standard-abnormal","name":"きれいさの基準共有と異常発見","kanten":"「基準のきれいさ」を共有し、清掃を形式で終わらせず設備の異常発見につなげられるか。","levels":["基準があいまいで人により差が出て、チェックリストを形式的に埋めるだけで異常に気づかない。","指示があれば清掃するが、基準の共有や異常発見への意識が薄い。","指示があれば汚れやすい所を重点的に掃除し、決めた基準に沿ってひと通り清掃できる。","指示がなくても基準のきれいさを意識し、清掃しながら設備トラブルの兆候に気づく。","5Sを異常の早期発見に結びつけ、基準の共有と継続の仕組みを新人に指導できる。"]}]},{"id":"treatment","category":"hygiene","no":"No.04","name":"治療","purposeShort":"体調の悪い豚を早く回復させ、悪化と感染拡大を防ぐ","aspects":[{"id":"withdrawal","name":"休薬期間の確認と治療豚の識別","kanten":"使用薬剤の休薬期間を確認し、治療豚を確実に識別して出荷から除外できるか。","levels":["休薬期間を確認せず、治療豚の識別もあいまいで、休薬中の豚を誤って出荷する危険がある。","指示があれば休薬を確認するが、治療豚の識別や記録に漏れが多い。","指示があれば休薬期間を確認し、治療豚を識別してひと通り管理できる。","指示がなくても休薬期間を必ず確認し、治療豚を明確に識別して出荷から除外する。","残留違反の重大さを理解し、休薬管理と個体識別の仕組みを新人に指導できる。"]},{"id":"protocol","name":"指示・用法の遵守と針の本数管理","kanten":"決められたやり方・指示を守り、注射針の本数を管理して紛失・混入を防げるか。","levels":["自己判断でやり方を変え、注射針の本数管理もせず紛失・混入の危険を放置する。","指示があれば従うが、用法の徹底や針の本数確認に漏れがある。","指示があれば決められたやり方・指示に従い、針の本数をひと通り確認できる。","指示がなくても用法を守り、注射針の本数管理を徹底して紛失・混入を防ぐ。","経験則での抗生剤選択のリスクや針混入の危険を理解し、正しい治療手順を新人に指導できる。"]},{"id":"identify-track","name":"個体識別と投薬経過の記録","kanten":"治療豚を明確に識別し、薬剤名・投与量・開始日など投薬経過を追える形で記録できるか。","levels":["治療豚の識別が不明瞭で、投薬経過を記録せず後から追えない。","指示されれば記録するが、薬剤名・投与量・開始日の記入漏れが多い。","指示があれば治療豚を識別し、投薬内容をひと通り記録できる。","指示がなくても投薬経過を漏れなく記録し、識別と記録を結びつけて管理する。","投薬経過の記録が休薬管理・治療評価に不可欠と理解し、記録の書き方を新人に指導できる。"]}]},{"id":"sow-vaccine","category":"hygiene","no":"No.06","name":"母豚ワクチン","purposeShort":"母豚と子豚を守る免疫をつけ、農場の免疫レベルをそろえる","aspects":[{"id":"schedule","name":"日齢・スケジュールの遵守","kanten":"決められた日齢・スケジュールで確実に接種し、打ち漏れを作らないか。","levels":["スケジュールを守らず、体調不良の母豚にそのまま接種して免疫を不十分にする。","指示があれば接種するが、対象や時期の確認に漏れがある。","指示があれば決められた日齢・スケジュールでひと通り接種できる。","指示がなくても対象と体調を確認して接種し、打ち漏れを防ぐ。","接種時期と免疫の関係を理解し、スケジュール管理と体調確認を新人に指導できる。"]},{"id":"vaccine-handling","name":"ワクチンの取り扱いと針交換","kanten":"生ワクチンは溶解後すぐ使い切り、不活化は当日中に使い、針を頭ごとに交換できるか。","levels":["溶解後の保管時間を超過し、注射針を使い回して感染リスクを高める。","指示があれば取り扱うが、使い切りの時間管理や針交換に漏れがある。","指示があれば生ワクチンを溶解後すぐ使い、針をひと通り交換できる。","指示がなくても溶解後の時間を守って使い切り、針を頭ごとに交換する。","ワクチンの失活や針使い回しのリスクを理解し、正しい取り扱いを新人に指導できる。"]}]},{"id":"csf-vaccine","category":"hygiene","no":"No.41","name":"CSF（豚熱）子ワクチン接種","purposeShort":"子豚の免疫を立ち上げ、豚熱の発生・死亡と経済被害を防ぐ","aspects":[{"id":"maternal-antibody","name":"移行抗体を考えた接種日齢","kanten":"移行抗体を考慮し、決められた日齢で接種して免疫獲得の失敗を防げるか。","levels":["移行抗体を考えず、抗体の高い時期に接種して免疫獲得を失敗させる。","指示があれば決められた日齢で接種するが、農場の抗体レベルへの意識が薄い。","指示があれば決められた日齢でひと通り接種できる。","指示がなくても移行抗体を考えた日齢で接種し、確実な免疫獲得を意識する。","移行抗体と免疫獲得の関係を理解し、農場の抗体レベルに応じた接種時期を新人に指導できる。"]},{"id":"no-miss","name":"全頭接種と記録","kanten":"全頭に確実に接種し、打ち漏れを作らず接種記録を残せるか。","levels":["打ち漏れを確認せず、接種記録も残さないため漏れが把握できない。","指示があれば接種するが、全頭確認や記録に漏れが多い。","指示があれば全頭にひと通り接種し、記録できる。","指示がなくても打ち漏れがないか確かめ、接種記録を確実に残す。","打ち漏れが防疫上の穴になることを理解し、全頭接種と記録の徹底を新人に指導できる。"]}]},{"id":"vaccine-assist","category":"hygiene","no":"No.45","name":"子ワクチン補助","purposeShort":"接種漏れ・誤接種を防ぎ、安全に正しい部位・量で接種できる環境を作る","aspects":[{"id":"role-restraint","name":"役割分担・声かけと保定","kanten":"役割分担と声かけを明確にし、豚を落ち着かせて無理のない保定ができるか。","levels":["役割分担や声かけをせず、豚を無理に保定して暴れさせる。","指示があれば補助するが、声かけや保定が不十分で接種を難しくする。","指示があれば役割分担に従い、ひと通り保定を補助できる。","指示がなくても声かけで連携し、豚を落ち着かせて安全に保定する。","安全な接種環境づくりの要点を理解し、役割分担と保定のコツを新人に指導できる。"]},{"id":"site-needle","name":"接種部位・針・残留の確認","kanten":"正しい部位・量・針で確実に筋注し、接種後の針折れ・針残留を確認してマーキングできるか。","levels":["浅く筋注できていない、成豚用量を子豚に投与する、針残留を確認しないなど危険な補助をする。","指示があれば補助するが、針の選択や残留確認、マーキングに漏れがある。","指示があれば正しい部位・量で接種を補助し、接種後にマーキングできる。","指示がなくても針の選択と体重・日齢を確認し、針折れ・残留を確かめてマーキングする。","針残留や誤用量の危険を理解し、確実な接種と確認の手順を新人に指導できる。"]}]},{"id":"washing","category":"hygiene","no":"No.40","name":"洗浄（離乳後）","purposeShort":"汚れと病原体を物理的に落とし、消毒が効く状態を作り舎内をリセットする","aspects":[{"id":"wash-order","name":"除糞→洗浄→乾燥→消毒の順序","kanten":"決められた順序を守り、有機物を残したまま消毒しないか、洗浄後に十分乾燥できるか。","levels":["有機物が残った状態で消毒薬を散布し、乾燥不十分のまま次ロットを入れる。","指示があれば洗浄するが、順序や乾燥の徹底に漏れが多い。","指示があれば除糞→洗浄→乾燥→消毒の順序をひと通り守れる。","指示がなくても順序を守り、有機物を落としてから消毒し、十分に乾燥させる。","有機物残存が消毒を無効化することを理解し、洗浄・乾燥の徹底を新人に指導できる。"]},{"id":"hidden-spots","name":"隅・溝・裏側の重点洗浄","kanten":"隅・溝・エサ箱・スノコ裏など汚れが溜まりやすい見えにくい場所を重点的に洗えるか。","levels":["見えやすい所だけ洗い、隅・溝・スノコ裏などの汚れを残す。","指示があれば洗うが、見えにくい場所の洗浄に漏れが多い。","指示があれば汚れが溜まりやすい場所をひと通り洗える。","指示がなくても隅・溝・スノコ裏まで重点的に洗い、汚れを残さない。","見えにくい場所の病原残存リスクを理解し、重点洗浄の着眼点を新人に指導できる。"]}]},{"id":"disinfect","category":"hygiene","no":"No.15","name":"消毒","purposeShort":"病原体を入れない・広げない・持ち出さず、農場の防疫レベルを保つ","aspects":[{"id":"concentration","name":"濃度・量・接触時間の遵守","kanten":"決められた濃度・量・接触時間を守り、目分量の希釈をしないか。","levels":["希釈濃度を目分量で調整し、接触時間も守らず規定を外す。","指示があれば希釈するが、濃度や接触時間の管理に漏れが多い。","指示があれば決められた濃度・量・接触時間をひと通り守れる。","指示がなくても正確に希釈し、接触時間を確保してから乾燥させる。","薬剤ごとの特性と濃度・接触時間の意味を理解し、正しい消毒を新人に指導できる。"]},{"id":"clean-first-ppe","name":"汚れ除去の徹底と防護具着用","kanten":"汚れを先に落としてから消毒し、防護マスク・ゴーグルを着けて曝露を防げるか。","levels":["有機物が残った面に散布して消毒剤を不活化させ、防護具も着けず薬剤に曝露する。","指示があれば汚れを落とすが、防護具の着用や汚れ除去の徹底に漏れがある。","指示があれば汚れを落としてから消毒し、防護具をひと通り着用できる。","指示がなくても汚れを確実に落としてから消毒し、防護具を着けて安全に作業する。","有機物による不活化と薬剤曝露の危険を理解し、汚れ除去と防護の徹底を新人に指導できる。"]}]},{"id":"lime","category":"hygiene","no":"No.44","name":"石灰散布","purposeShort":"農場出入口に防疫バリアを作り、病原体の侵入・拡散を抑える","aspects":[{"id":"moisture","name":"含水と散布量の管理","kanten":"地面が白く見える量を目安に、乾燥粉末のままでなく消毒効果の出る状態で散布できるか。","levels":["乾燥粉末のまま散布し、量の目安も守らず消毒効果を出せない。","指示があれば散布するが、含水や量の管理に漏れがある。","指示があれば地面が白く見える量を目安にひと通り散布できる。","指示がなくても消毒効果の出る含水状態にし、劣化を見て定期的に補充する。","石灰の消毒が効く条件（含水率）を理解し、散布量と補充の管理を新人に指導できる。"]},{"id":"wind-safety","name":"風向き確認と防護","kanten":"風向きを確認して粉末飛散を防ぎ、人・豚にかからないよう防護具を着けて散布できるか。","levels":["風向きを確認せず粉末を飛散させ、防護具も着けず呼吸器障害や周辺苦情を招く。","指示があれば注意するが、風向き確認や防護具着用に漏れがある。","指示があれば人・豚に直接かからないようひと通り注意して散布できる。","指示がなくても風向きを確認して飛散を防ぎ、防護具を着けて安全に散布する。","飛散による健康被害・苦情のリスクを理解し、安全な散布方法を新人に指導できる。"]}]},{"id":"carcass","category":"hygiene","no":"No.37","name":"死獣回収","purposeShort":"病原体の拡散と悪臭・害獣被害を防ぎ、法令を守る","aspects":[{"id":"prompt-storage","name":"速やかな回収と専用保管","kanten":"死亡確認後すぐに回収し、豚房内に放置せず専用の保管場所へ入れられるか。","levels":["死体を豚房内に放置し、他の豚が接触して感染源になっても気にしない。","指示があれば回収するが、回収の遅れや保管場所の管理に漏れがある。","指示があれば死亡確認後にひと通り回収し、専用保管場所へ入れられる。","指示がなくても速やかに回収して専用場所へ入れ、感染源化を防ぐ。","死体放置の感染リスクを理解し、速やかな回収・保管の手順を新人に指導できる。"]},{"id":"law-record","name":"法令遵守と死亡記録","kanten":"堆肥混入などの違法処理を避け、感染症疑いは自己判断せず、死亡状況を記録できるか。","levels":["死亡子豚を堆肥に混入するなど違法な処理をし、記録も残さない。","指示されれば記録するが、法令の理解が浅く記録に漏れが多い。","指示があれば専用処理へ回し、死亡状況をひと通り記録できる。","指示がなくても法令に沿って処理し、感染症疑いは自己判断せず、死亡日・頭数・原因を記録する。","化製場法・廃棄物処理法の要点を理解し、正しい処理と記録を新人に指導できる。"]}]},{"id":"ai-insem","category":"breeding","no":"No.14","name":"AI（人工授精）注入作業","purposeShort":"受胎数・産子数を高く保ち、精液を無駄なく計画的に使う","aspects":[{"id":"acceptance","name":"許容確認と挿入の判断","kanten":"許容を確認してから無理なく挿入し、排卵タイミングに合った適期に注入できるか。","levels":["許容を確かめず無理に挿入し、排卵タイミングを無視して受胎率を落とす。","指示があれば実施するが、許容確認が不十分で適期を外すことが多い。","指示があれば許容を確認し、指示された適期にひと通り注入できる。","指示がなくても許容を確かめてから適期に注入し、無理な挿入を避ける。","許容開始からの排卵時間を理解し、適期の判断と丁寧な注入を新人に指導できる。"]},{"id":"hygiene-temp","name":"器具・外陰部の清潔と精液の温度管理","kanten":"器具・外陰部を清潔に保ち、精液をゆっくり入れ、急激な加温を避けて温度管理できるか。","levels":["器具・外陰部を清潔にせず、精液を急激に加温してカテーテル汚染や高温障害を招く。","指示があれば清潔にするが、温度管理や注入速度に漏れがある。","指示があれば器具・外陰部を清潔に保ち、精液をひと通りゆっくり入れられる。","指示がなくても清潔を徹底し、精液を急激に加温せずゆっくり注入する。","子宮炎・高温障害の仕組みを理解し、清潔操作と温度管理を新人に指導できる。"]}]},{"id":"standing-check","category":"breeding","no":"No.33","name":"許容確認","purposeShort":"交配に入れる最適なタイミングを見極め、受胎率と産子数を上げる","aspects":[{"id":"boar-backpressure","name":"雄豚接触＋背圧での確認","kanten":"雄豚を接触させ、背圧をかけて強く押しても動かず立つかを確かめられるか。","levels":["雄豚を近づけず外陰部の腫れだけで判断し、偽陰性・適期外授精を招く。","指示があれば背圧を確かめるが、雄豚接触が不十分で判断が甘い。","指示があれば雄豚接触＋背圧で許容をひと通り確認できる。","指示がなくても雄豚を接触させて背圧をかけ、静止するかを確実に確かめる。","許容反応の仕組みを理解し、確実な確認方法と適期の見極めを新人に指導できる。"]},{"id":"quiet-timing","name":"静かな母豚・夜間発情の見落とし防止","kanten":"静かな母豚は外見・行動も合わせて見て、夜間・早朝発情を見落とさず確認できるか。","levels":["1日1回の確認だけで、夜間・早朝発情や静かな母豚の発情を見落とす。","指示があれば確認するが、静かな母豚や時間帯による見落としが多い。","指示があれば静かな母豚も外見・行動を合わせてひと通り確認できる。","指示がなくても確認回数を工夫し、静かな母豚も排尿等の行動から発情を捉える。","夜間発情や微弱発情の見落としリスクを理解し、確認のタイミングを新人に指導できる。"]}]},{"id":"semen-check","category":"breeding","no":"No.03","name":"精液検査・反転","purposeShort":"問題のある精液を使用前に除外し、繁殖成績の低下を防ぐ","aspects":[{"id":"temp-control","name":"17℃保管と温度変化の抑制","kanten":"精液を17℃前後で保管し、検査前の温度を均一にして温度変化を最小限にできるか。","levels":["保管温度を気にせず、検査前の温度も不均一なまま評価して誤判定する。","指示があれば温度を確認するが、変化の抑制や均一化に漏れがある。","指示があれば17℃前後で保管し、ひと通り温度に配慮できる。","指示がなくても温度変化を最小限に抑え、検査前に温度を均一にする。","温度が精子品質に与える影響を理解し、保管・検査時の温度管理を新人に指導できる。"]},{"id":"activity-mix","name":"精子活力確認と穏やかな反転","kanten":"顕微鏡で精子活力を確認し、反転を穏やかに行って精子へのダメージを防げるか。","levels":["活力確認を省き、新鮮精液を激しく振盪して精子を傷める。","指示があれば確認するが、反転の強さやタイミングに漏れがある。","指示があれば顕微鏡で活力を確認し、ひと通り穏やかに反転できる。","指示がなくても活力を確認し、反転を穏やかに行ってダメージを防ぐ。","精子活力と反転操作の関係を理解し、検査と反転の手技を新人に指導できる。"]}]},{"id":"semen-mix","category":"breeding","no":"No.17","name":"精液攪拌","purposeShort":"精子濃度を均一化する","aspects":[{"id":"gentle-mix","name":"穏やかな攪拌と温度・浸透圧の配慮","kanten":"強く振らず穏やかに攪拌し、希釈液との温度差や気泡混入を避けられるか。","levels":["強く振って気泡を混入させ、希釈液との温度差で浸透圧ショックを招く。","指示があれば攪拌するが、強さや温度差への配慮に漏れがある。","指示があれば穏やかにひと通り攪拌できる。","指示がなくても温度差を抑えて穏やかに攪拌し、気泡混入を避ける。","浸透圧ショックや酸化ストレスの仕組みを理解し、攪拌のコツを新人に指導できる。"]},{"id":"light-shield","name":"遮光の徹底","kanten":"遮光を守り、紫外線・光線による精子ダメージを防げるか。","levels":["遮光を怠り、光にさらして精子を傷める。","指示があれば遮光するが、徹底に漏れがある。","指示があればひと通り遮光して扱える。","指示がなくても遮光を徹底し、光線ダメージを防ぐ。","光が精子に与える影響を理解し、遮光管理を新人に指導できる。"]}]},{"id":"preg-check","category":"breeding","no":"No.09","name":"妊娠鑑定","purposeShort":"分娩・離乳頭数を計画通り確保し、空胎母豚を早く見つけて対応する","aspects":[{"id":"timing-recheck","name":"鑑定時期の厳守と再確認","kanten":"交配後24〜28日に鑑定し、1回で判断せず35〜40日で必ず再確認できるか。","levels":["1回の確認だけで妊娠を確定し、21日目などの偽陽性を見落とす。","指示があれば鑑定するが、時期の厳守や再確認に漏れが多い。","指示があれば決められた時期に鑑定し、ひと通り実施できる。","指示がなくても24〜28日に鑑定し、35〜40日で必ず再確認する。","偽陽性・偽陰性の時期特性を理解し、鑑定時期と再確認の重要性を新人に指導できる。"]},{"id":"echo-reading","name":"エコー画像の正しい読み取り","kanten":"膀胱・腸内容物と胎胞を混同せず、エコー画像を正しく読み取れるか。","levels":["膀胱や腸内容物を妊娠と誤読し、判定を誤る。","指示があれば当てるが、画像の読み取りに誤りが多い。","指示があればひと通りエコーを当てて胎胞を確認できる。","指示がなくても膀胱・腸内容物と胎胞を見分けて正しく判定する。","エコー画像の見分け方を理解し、誤読を避ける読み取りを新人に指導できる。"]},{"id":"recheck-return","name":"鑑定後の再発情チェック","kanten":"鑑定後も再発情チェックを続け、空胎の長期化を防げるか。","levels":["鑑定後の再発情チェックを中断し、空胎を長期化させる。","指示があれば確認するが、継続に漏れが多い。","指示があれば鑑定後の再発情をひと通り確認できる。","指示がなくても再発情チェックを続け、空胎の母豚を早く見つける。","再発情チェックの意義を理解し、空胎長期化を防ぐ管理を新人に指導できる。"]}]},{"id":"pms","category":"breeding","no":"No.08","name":"PMS投与","purposeShort":"発情が弱い・来ない母豚に発情を誘起し、タイミングをそろえる","aspects":[{"id":"timing-judge","name":"投与時期と黄体確認","kanten":"基本は離乳当日〜翌日に投与し、黄体遺残をエコー確認して重複投与を避けられるか。","levels":["黄体遺残を確認せず重複投与し、投与時期も守らない。","指示があれば投与するが、時期や黄体確認に漏れがある。","指示があれば決められた時期に用量を守ってひと通り投与できる。","指示がなくても離乳当日〜翌日に投与し、黄体遺残を確認して重複を避ける。","黄体とホルモン誘起の関係を理解し、投与時期と適応の判断を新人に指導できる。"]},{"id":"no-self-judge","name":"自己判断の回避と投与後の確認","kanten":"使いすぎず上長・獣医師と相談し、未経産・経産を区別し、投与後の雄豚刺激で許容を確認できるか。","levels":["自己判断で使い、未経産・経産を区別せず、投与後の許容反応も確認しない。","指示があれば投与するが、相談や投与後確認に漏れがある。","指示があれば上長・獣医師と相談してひと通り投与できる。","指示がなくても使いすぎを避けて相談し、投与後は雄豚刺激で許容反応を確認する。","誘起剤の適正使用と個体差を理解し、相談と投与後確認の要点を新人に指導できる。"]}]},{"id":"echo-check","category":"breeding","no":"No.24","name":"入室準備（エコー検査）","purposeShort":"妊娠している母豚だけを分娩舎に入れ、空胎を早く見つける","aspects":[{"id":"timing-hold","name":"実施時期の遵守と保留判定","kanten":"決められた時期に実施し、判定があいまいな個体は保留・再確認できるか。","levels":["時期を守らず、あいまいな判定でも確定してしまう。","指示があれば実施するが、保留・再確認の判断に漏れがある。","指示があれば決められた時期にひと通り検査できる。","指示がなくても時期を守り、あいまいな個体は保留して再確認する。","誤判定のリスクを理解し、保留・再確認の判断を新人に指導できる。"]},{"id":"reflect-result","name":"結果の即時反映と入室前の環境確認","kanten":"結果をその場でプレート・リストに反映し、分娩舎の衛生・飲水を確認できるか。","levels":["結果を反映せず、分娩舎の衛生・飲水確認も省く。","指示があれば反映するが、記録や環境確認に漏れがある。","指示があれば結果をひと通りプレート・リストに反映できる。","指示がなくても結果を即時反映し、入室前に分娩舎の衛生・飲水を確認する。","結果反映と環境準備の意義を理解し、入室前チェックを新人に指導できる。"]}]},{"id":"pg","category":"breeding","no":"No.36","name":"PG（プロスタグランジン）接種","purposeShort":"分娩のタイミングをそろえ、分娩管理・立会いをしやすくする","aspects":[{"id":"gestation-day","name":"妊娠日数の確認と適期投与","kanten":"妊娠日数を正しく数え、113日以前の禁忌を避けて決められた日齢・対象に接種できるか。","levels":["妊娠日数を誤算して113日以前に投与し、早産・死産を招く。","指示があれば接種するが、日数確認や対象確認に漏れがある。","指示があれば決められた日齢・対象にひと通り接種できる。","指示がなくても妊娠日数を確認し、対象母豚を確かめて適期に接種する。","早期投与の禁忌と黄体の関係を理解し、適期投与の判断を新人に指導できる。"]},{"id":"injection-obs","name":"確実な注射と誘起後の分娩観察","kanten":"脂肪層への誤注射を避けて確実に注射し、誘起後の分娩観察を強化できるか。","levels":["脂肪層に誤注射して効果を弱め、誘起後の分娩観察も強化しない。","指示があれば接種するが、注射部位や観察強化に漏れがある。","指示があればひと通り正しく注射し、誘起後の観察ができる。","指示がなくても確実に筋注し、誘起後は分娩観察を強化する。","誤注射による吸収遅延を理解し、確実な注射と観察強化を新人に指導できる。"]}]},{"id":"uterine-wash","category":"breeding","no":"No.42","name":"子宮内洗浄","purposeShort":"子宮内の汚染物を減らし、子宮炎・発熱を防ぎ産後回復を促す","aspects":[{"id":"target-select","name":"対象選定と獣医師指示の遵守","kanten":"全頭には行わず対象を選定し、薬剤の濃度・量を守って獣医師の指示に従えるか。","levels":["全頭にルーチンで行い、薬剤の濃度・量も守らず自然回復を妨げる。","指示があれば実施するが、対象選定や濃度管理に漏れがある。","指示があれば対象を選び、決められた濃度・量でひと通り実施できる。","指示がなくても手入れした母豚等に絞り、濃度・量を守って獣医師の指示に従う。","予防的ルーチン洗浄の弊害を理解し、対象選定と適正実施を新人に指導できる。"]},{"id":"aseptic-gentle","name":"滅菌器具・穏やかな操作と術後観察","kanten":"滅菌した器具・洗浄液を使い、強くこすらず、実施後の体調・悪露を観察できるか。","levels":["非滅菌の器具・洗浄液を使い、強くこすって子宮内膜を傷め、術後観察も省く。","指示があれば実施するが、滅菌や術後観察に漏れがある。","指示があれば滅菌器具でひと通り実施し、術後の体調を確認できる。","指示がなくても滅菌器具で穏やかに操作し、実施後の体調・悪露を観察する。","二次汚染・内膜損傷のリスクを理解し、無菌操作と術後観察を新人に指導できる。"]}]},{"id":"farrow-entry","category":"farrowing","no":"No.26","name":"入室（分娩舎）","purposeShort":"分娩が近い母豚だけを入れ、落ち着いた状態で分娩を迎えさせる","aspects":[{"id":"prep-before","name":"入室前の舎内準備","kanten":"入室前に床・温度・水・エサと分娩クレートの洗浄・乾燥を整えられるか。","levels":["分娩舎の温度・保温灯を確認せず、クレート洗浄・乾燥も未完了のまま入室させ、子豚低体温死を招く。","指示があれば準備するが、温度設定やクレート乾燥の確認に漏れがある。","指示があれば床・温度・水・エサをひと通り整えられる。","指示がなくても入室前に温度・保温灯・水・エサとクレートの洗浄・乾燥を確認する。","入室前準備が子豚の生存に直結すると理解し、準備の要点を新人に指導できる。"]},{"id":"batch-entry","name":"適期の一斉入室と入室後観察","kanten":"分娩が近い母豚をロットごとに一斉入室させ、途中追加を避け、入室後の体調・行動を観察できるか。","levels":["入室タイミングが遅れて妊娠舎で分娩させ、入室後の観察も怠る。","指示があれば入室させるが、タイミングや一斉入室の管理に漏れがある。","指示があればロットごとに一斉入室させ、ひと通り観察できる。","指示がなくても適期にロット単位で入室させ、途中追加を避けて入室後を観察する。","オールイン・オールアウトの意義を理解し、適期入室と観察を新人に指導できる。"]}]},{"id":"farrow-assist","category":"farrowing","no":"No.35","name":"分娩介助","purposeShort":"母豚と子豚の命を守り、死産・直後の死亡を減らし初乳を飲ませる","aspects":[{"id":"timing","name":"介助タイミングの見極め","kanten":"分娩間隔を計り、子豚が長く出てこない時だけ適切に介助できるか。","levels":["分娩間隔を見ずに放置し、45分を超えても介助せず低酸素・死産を増やす。","指示があれば介助するが、分娩間隔の見極めが甘く判断は他者まかせ。","指示があれば分娩間隔を計り、長く出ない時にひと通り介助できる。","指示がなくても分娩間隔を計り、必要な時だけ適切に介助する。","分娩間隔と低酸素・死産の関係を理解し、介助の見極めを新人に指導できる。"]},{"id":"asepsis-lubric","name":"清潔・潤滑と薬剤の適正使用","kanten":"介助時に清潔と潤滑を守り、オキシトシンを過剰投与せず適正に使えるか。","levels":["清潔・潤滑を守らず、オキシトシンを過剰投与して過強陣痛・死産を招く。","指示があれば清潔にするが、潤滑や薬剤量の管理に漏れがある。","指示があれば清潔と潤滑を守り、ひと通り介助できる。","指示がなくても清潔・潤滑を徹底し、薬剤を適正量で使う。","過剰投与の危険を理解し、清潔操作と薬剤の適正使用を新人に指導できる。"]},{"id":"newborn-care","name":"新生子豚の乾燥・保温・蘇生","kanten":"生まれた子豚をすぐ乾かし温め、呼吸を確認し、仮死子豚を蘇生できるか。","levels":["子豚を乾かさず温めず、仮死子豚を死産と誤判断して蘇生処置を省く。","指示があれば処置するが、呼吸確認や蘇生の判断に漏れがある。","指示があれば子豚を乾かし温め、呼吸をひと通り確認できる。","指示がなくてもすぐ乾かして温め、仮死子豚を見分けて蘇生処置を行う。","仮死と死産の見分けや蘇生の意義を理解し、新生子豚の初期処置を新人に指導できる。"]}]},{"id":"cross-foster","category":"farrowing","no":"No.39","name":"送り里子","purposeShort":"乳頭数と子豚数のバランスを整え、離乳頭数を増やし弱子を助ける","aspects":[{"id":"colostrum-first","name":"初乳摂取後の里子と対象選び","kanten":"初乳を飲ませてから、日齢・体重が近い健康な子豚を組み合わせ、乳頭数を超えないよう里子に出せるか。","levels":["初乳摂取が不十分なまま移動させ、体重差の大きい子豚を混ぜ、病気の子豚も里子にする。","指示があれば里子に出すが、初乳確認や対象選びに漏れが多い。","指示があれば初乳を飲ませてから日齢・体重の近い子豚をひと通り組める。","指示がなくても生後12〜24時間で初乳を飲ませ、体重差を抑えて乳頭数内に収める。","初乳と免疫獲得の関係を理解し、里子の対象選びと頭数管理を新人に指導できる。"]},{"id":"acceptance-care","name":"母豚の拒絶対策","kanten":"里子移動時に臭い付けなどで母豚の拒絶を防ぎ、定着を確認できるか。","levels":["臭い付けなどの拒絶対策をせず、母豚に拒まれても放置する。","指示があれば対策するが、定着の確認に漏れがある。","指示があれば拒絶対策をひと通り行える。","指示がなくても臭い付け等で拒絶を防ぎ、定着を確認する。","母豚の拒絶の仕組みを理解し、拒絶対策と定着確認を新人に指導できる。"]}]},{"id":"sow-lineup","category":"facility","no":"No.13","name":"母豚の並びの整理","purposeShort":"母豚をまとめて管理しやすくし、ケンカ・ストレスを減らす","aspects":[{"id":"schedule-order","name":"分娩予定日順の整列と台帳反映","kanten":"交配日・分娩予定日のズレを抑えて整列させ、並び情報を台帳に反映できるか。","levels":["分娩予定日順に整列させず、並び情報も台帳に反映せず認識齟齬を招く。","指示があれば整列させるが、予定日順の徹底や台帳反映に漏れがある。","指示があれば分娩予定日順にひと通り整列できる。","指示がなくても予定日のズレを抑えて整列させ、並び情報を台帳に反映する。","整列と移動指示の連動を理解し、並び管理と台帳反映を新人に指導できる。"]},{"id":"compatibility","name":"体格差・攻撃性への配慮","kanten":"極端に弱い・大きい母豚や攻撃的な個体を同じ並びに入れず、負傷を防げるか。","levels":["体格差・攻撃性を考えず収容し、負傷が出ても気にしない。","指示があれば配慮するが、体格差や攻撃性の見極めに漏れがある。","指示があれば極端に弱い・大きい母豚を分けてひと通り配置できる。","指示がなくても体格差・攻撃性を見て収容し、妊娠初期の大きな並び替えを避ける。","収容と負傷・ストレスの関係を理解し、相性を考えた配置を新人に指導できる。"]}]},{"id":"move-order","category":"facility","no":"No.10","name":"移動指示","purposeShort":"ピッグフローを滞らせず、豚にストレスをかけず安全に移動させる","aspects":[{"id":"count-handover","name":"頭数・グループ確認と引き継ぎ","kanten":"移動する頭数・グループを事前確認し、口頭のみに頼らず引き継いで誤移動を防げるか。","levels":["口頭のみで指示し、頭数照合もせず担当交代時に誤移動・在庫ズレを招く。","指示があれば確認するが、頭数照合や引き継ぎに漏れが多い。","指示があれば移動頭数・グループをひと通り事前確認できる。","指示がなくても頭数・グループを確認し、記録で引き継いで実頭数と照合する。","誤移動・在庫ズレのリスクを理解し、頭数管理と引き継ぎを新人に指導できる。"]},{"id":"route-biosec","name":"通路確認と移動先の清浄性","kanten":"通路の段差・滑り・障害物を先に確認し、移動先の清掃・消毒完了を確かめて汚染搬入を防げるか。","levels":["通路を確認せず、清掃・消毒完了前の汚染豚舎に搬入する。","指示があれば通路を見るが、移動先の清浄性確認に漏れがある。","指示があれば通路の危険をひと通り確認できる。","指示がなくても通路を先に点検し、移動先の清掃・消毒完了を確かめてから移動する。","移動と防疫の関係を理解し、通路点検と清浄性確認を新人に指導できる。"]}]},{"id":"move-preg","category":"facility","no":"No.25","name":"妊娠舎→交配舎・育成舎 移動","purposeShort":"ピッグフローを守って次の舎へつなぐ","aspects":[{"id":"quiet-move","name":"静かな追い方と適期移動","kanten":"静かに追い無理に走らせず、分娩予定を踏まえた適期に移動できるか。","levels":["分娩予定より早く移動させ、妊娠後期の母豚を急かしてストレス・分娩事故を招く。","指示があれば移動させるが、追い方や時期の見極めに漏れがある。","指示があれば静かにひと通り移動できる。","指示がなくても静かに追い、分娩予定を踏まえた適期に無理なく移動する。","移動時期とストレスの関係を理解し、静かな移動と適期の判断を新人に指導できる。"]},{"id":"dest-check","name":"移動先の水・エサ・収容確認","kanten":"移動先の水・エサと収容スペースを事前に確認し、過密搬入を防げるか。","levels":["移動先の水・エサや収容スペースを確認せず、過密に搬入する。","指示があれば確認するが、収容スペースの確認に漏れがある。","指示があれば移動先の水・エサをひと通り確認できる。","指示がなくても移動先の水・エサと収容スペースを確かめ、過密を避ける。","過密搬入のリスクを理解し、移動先確認の要点を新人に指導できる。"]}]},{"id":"scraper","category":"facility","no":"No.19","name":"スクレーパー動作確認","purposeShort":"除糞機能を正常に保ち、機械トラブルを早期発見して大故障を防ぐ","aspects":[{"id":"safety-power","name":"電源遮断など安全手順","kanten":"確認・清掃の前に必ず電源を切り、回転部・可動部に安全に触れられるか。","levels":["電源を切らずに点検・清掃し、回転部に触れて事故の危険を招く。","指示があれば電源を切るが、徹底が甘く危険な操作が残る。","指示があれば確認・清掃前に電源をひと通り切れる。","指示がなくても必ず電源を切ってから安全に点検・清掃する。","回転部の危険を理解し、電源遮断など安全手順を新人に指導できる。"]},{"id":"wear-report","name":"異音・摩耗の点検と異常時の停止・報告","kanten":"異音・振動・チェーンやワイヤの摩耗を点検し、異常があれば無理に動かさず報告できるか。","levels":["定期確認をせず異音・動作不良や摩耗を見落とし、汚液滞留・断線を招く。","指示があれば点検するが、摩耗の見極めや異常時の対応に漏れがある。","指示があれば異音・振動やチェーンの摩耗をひと通り点検できる。","指示がなくても定期点検し、異常があれば無理に動かさず停止して報告する。","摩耗・断線のリスクを理解し、点検の着眼点と異常時対応を新人に指導できる。"]}]},{"id":"fan-clean","category":"facility","no":"No.29","name":"ファン清掃","purposeShort":"換気能力を保ち、呼吸器トラブル・暑熱ストレスを防ぎ設備を長持ちさせる","aspects":[{"id":"power-off","name":"電源遮断と安全な清掃","kanten":"作業前に必ず電源を切り、モーター・配線に水をかけずに清掃できるか。","levels":["電源を切らずに清掃して回転部に接触し、モーターや配線に水をかける危険な作業をする。","指示があれば電源を切るが、水かけ回避などの徹底が甘い。","指示があれば電源を切り、羽根・シャッター・ネットの汚れをひと通り落とせる。","指示がなくても電源を切り、モーターや配線を避けて安全に清掃する。","感電・巻き込みの危険を理解し、安全な清掃手順を新人に指導できる。"]},{"id":"belt-check","name":"ファンベルト・効率の点検","kanten":"埃の堆積やベルトの劣化を点検し、換気効率の低下や突然停止を防げるか。","levels":["埃の堆積やベルト劣化を確認せず、換気効率低下や突然停止を招く。","指示があれば清掃するが、ベルト劣化や効率低下の点検に漏れがある。","指示があれば埃を落とし、目に見える不具合をひと通り確認できる。","指示がなくてもベルトの劣化を点検し、換気効率の低下に早く気づく。","換気効率と暑熱死のリスクを理解し、ベルト・効率の点検を新人に指導できる。"]}]},{"id":"pad-tank","category":"facility","no":"No.30","name":"パドタンク清掃（夏季）","purposeShort":"クーリング性能を保ち、藻・細菌・悪臭を防ぎ設備を長持ちさせる","aspects":[{"id":"regular-clean","name":"定期清掃と藻・バイオフィルム防止","kanten":"月1回以上の清掃を守り、藻・バイオフィルムの発生を防げるか。作業前に電源を切り水を抜けるか。","levels":["清掃を怠って藻・バイオフィルムを発生させ、電源も切らずに作業する。","指示があれば清掃するが、頻度や電源遮断・排水の手順に漏れがある。","指示があれば電源を切り水を抜いて、やさしくひと通り清掃できる。","指示がなくても月1回以上清掃し、フィルターやポンプも一緒に確認する。","クーリング性能と衛生の関係を理解し、定期清掃の手順を新人に指導できる。"]},{"id":"chlorine-temp","name":"残留塩素・水温・濃度の管理","kanten":"残留塩素・水温を確認して細菌増殖を防ぎ、塩素系消毒剤を高濃度にせず飲水量低下を招かないか。","levels":["残留塩素・水温を確認せず補充のみで細菌を増やし、消毒剤を高濃度にして飲水量を落とす。","指示があれば確認するが、濃度や水温の管理に漏れがある。","指示があれば残留塩素・水温をひと通り確認できる。","指示がなくても残留塩素・水温を確認し、消毒剤の濃度を適正に保つ。","細菌増殖と飲水量の関係を理解し、塩素・水温・濃度の管理を新人に指導できる。"]}]},{"id":"feed-switch","category":"facility","no":"No.20","name":"エサスイッチ","purposeShort":"給餌を安定させ、ムダな飼料を減らし機械トラブルを防ぐ","aspects":[{"id":"switch-position","name":"スイッチ位置と異常時の停止","kanten":"自動・手動・切の位置を確認し、ホッパー空・詰まり・異音時はすぐオフにできるか。","levels":["スイッチ位置を確認せず、ホッパー空や詰まり・異音があってもオフにしない。","指示があれば位置を確認するが、異常時の停止対応に漏れがある。","指示があれば自動・手動・切の位置をひと通り確認できる。","指示がなくても位置を確認し、ホッパー空・詰まり・異音時はすぐオフにする。","給餌設備のトラブルを理解し、スイッチ操作と異常時対応を新人に指導できる。"]},{"id":"timer-record","name":"タイマー変更後の動作確認と記録","kanten":"設定変更は決められた人が行い、タイマー変更後は動作確認し、切り替え日を記録できるか。","levels":["権限のない者が設定を変え、変更後の動作確認もせず切り替え日も記録しない。","指示があれば確認するが、動作確認や記録に漏れがある。","指示があればタイマー変更後の動作をひと通り確認できる。","指示がなくても変更後に動作を確認し、切り替え日を記録して二重切り替えを防ぐ。","設定変更と給餌事故の関係を理解し、動作確認と記録の徹底を新人に指導できる。"]}]},{"id":"daily-report","category":"record","no":"No.05","name":"日報記入","purposeShort":"豚の状態を記録して病気を早期発見し、成績を数字で残し改善に役立てる","aspects":[{"id":"accurate-timely","name":"その場での正確な記録","kanten":"記憶頼りのまとめ書きを避け、その場で事実と数字を正確に記録できるか。","levels":["記憶頼りで後からまとめ書きし、数値の単位ズレなど不正確な記録をする。","指示があれば記録するが、まとめ書きや単位ズレが多い。","指示があればその場で事実と数字をひと通り正確に記録できる。","指示がなくてもその場で正確に記録し、単位や数値を確かめる。","記録の正確さが早期発見・改善に不可欠と理解し、正確な記入を新人に指導できる。"]},{"id":"shared-rule-use","name":"共通ルールでの記入と活用","kanten":"全員が同じルールで書き、書くだけで終わらせず見返して活用できるか。治療豚情報を漏らさないか。","levels":["自己流で書き、治療豚の薬剤名・投与量・開始日を記入せず休薬管理を抜けさせる。","指示があれば共通ルールで書くが、活用や治療豚情報の記入に漏れがある。","指示があれば共通ルールに沿ってひと通り記入できる。","指示がなくても共通ルールで書き、治療豚情報を漏らさず、記録を見返して活用する。","記録の共有と活用の意義を理解し、共通ルールと活用方法を新人に指導できる。"]}]},{"id":"plate","category":"record","no":"No.07","name":"プレート作成","purposeShort":"個体・群をすぐ見分けられるようにし、ワクチン・治療・休薬中を示す","aspects":[{"id":"update","name":"最新状態への更新と旧プレート処理","kanten":"情報を最新に保ち、分娩後の作成忘れや、差し替え時の古いプレートの残存を防げるか。","levels":["分娩後に作成し忘れ、差し替え時も古いプレートを廃棄せず誤情報を残す。","指示があれば更新するが、作成忘れや旧プレート処理に漏れがある。","指示があれば情報をひと通り最新に更新できる。","指示がなくても分娩後すぐ作成し、差し替え時は古いプレートを確実に廃棄する。","情報の鮮度が個体管理に直結すると理解し、更新と旧プレート処理を新人に指導できる。"]},{"id":"readable","name":"誰にでも分かる表記・帳票一致","kanten":"誰が見ても分かる表記・色分けにし、日報や帳票の内容と一致させられるか。","levels":["担当者ごとに書式が異なり、後任者が判読できず帳票とも食い違う。","指示があれば書くが、表記の統一や帳票一致に漏れがある。","指示があれば分かる表記・色分けでひと通り作成できる。","指示がなくても誰でも分かる統一表記にし、日報・帳票と一致させる。","表記統一の意義を理解し、分かりやすいプレート作成を新人に指導できる。"]}]},{"id":"tagging","category":"record","no":"No.21","name":"タグ付け","purposeShort":"1頭ずつ確実に見分け、健康・繁殖・治療・出荷を一貫管理し追跡可能にする","aspects":[{"id":"position-asepsis","name":"正しい位置と装着前消毒","kanten":"決められた位置・向きに正しく付け、装着前に器具と耳を消毒できるか。","levels":["装着位置・向きが不統一で読み取りにくく、器具・耳の消毒もしない。","指示があれば付けるが、位置の統一や消毒に漏れがある。","指示があれば決められた位置に、消毒してひと通り装着できる。","指示がなくても位置・向きを統一し、装着前に器具と耳を消毒する。","読み取りやすさと感染防止を理解し、正しい装着と消毒を新人に指導できる。"]},{"id":"reattach","name":"脱落・破損時の再装着","kanten":"脱落・破損を見つけ次第付け直し、個体不明のまま管理を続けないか。","levels":["タグ付け忘れや脱落後の再装着をせず、個体不明のまま出荷しトレーサビリティを断つ。","指示があれば付け直すが、脱落の発見や再装着に漏れがある。","指示があれば脱落・破損をひと通り付け直せる。","指示がなくても脱落・破損を見つけ次第付け直し、個体不明を作らない。","トレーサビリティの重要性を理解し、脱落時の再装着徹底を新人に指導できる。"]}]},{"id":"farrow-schedule","category":"record","no":"No.32","name":"分娩予定記入","purposeShort":"分娩時期を把握して舎・人手を計画的に準備し、不受胎を早期発見する","aspects":[{"id":"calc","name":"妊娠日齢の統一計算","kanten":"妊娠日齢の数え方を統一し、交配日から114〜115日後を正確に計算できるか。","levels":["交配日の記録が抜け、日齢の数え方も不統一で分娩予定を計算できない。","指示があれば計算するが、数え方の統一や幅の考慮に漏れがある。","指示があれば交配日から予定日をひと通り計算できる。","指示がなくても統一した数え方で114〜115日後を正確に計算する。","計算のズレが準備に与える影響を理解し、統一した数え方を新人に指導できる。"]},{"id":"rewrite","name":"再交配時の書き直しと母豚観察","kanten":"交配・再交配のたびに書き直し、予定日だけで判断せず母豚の様子も確認できるか。","levels":["再交配時に修正記入を忘れ、予定日だけで判断して母豚の様子を見ない。","指示があれば書き直すが、修正漏れや観察不足がある。","指示があれば交配・再交配のたびにひと通り書き直せる。","指示がなくても再交配時に必ず書き直し、母豚の様子も合わせて確認する。","書き直し漏れがスケジュール混乱を招くと理解し、記入と観察の徹底を新人に指導できる。"]}]},{"id":"cull-ship","category":"shipping","no":"No.22","name":"廃豚出荷（母豚出し）","purposeShort":"繁殖群を計画的に更新し、母豚に無理をさせず安全に出荷する","aspects":[{"id":"welfare-law","name":"歩様確認と法令遵守","kanten":"歩けない・立てない豚は出荷せず、出荷前に体調・歩様を確認し、絶食時も水を止めないか。","levels":["歩けない豚を出荷し、体調・歩様の確認も絶食時の給水も怠る。","指示があれば確認するが、歩様の見極めや給水管理に漏れがある。","指示があれば体調・歩様をひと通り確認して出荷できる。","指示がなくても歩けない豚を除外し、絶食時も水を止めずに安全に出荷する。","と畜場法・輸送指針を理解し、welfareに配慮した出荷を新人に指導できる。"]},{"id":"cull-select","name":"廃豚候補の選定と誤出荷防止","kanten":"廃豚選定基準に沿って選び、休薬期間中の治療豚と混同せず、体重・体型を確認できるか。","levels":["休薬中の治療豚と廃豚候補を混同して誤出荷し、体重・体型確認も省く。","指示があれば選定するが、基準の統一や治療豚との区別に漏れがある。","指示があれば選定基準に沿ってひと通り選べる。","指示がなくても基準に沿って選び、治療豚と区別し、体重・体型を確認する。","選定基準と残留違反のリスクを理解し、廃豚選定と誤出荷防止を新人に指導できる。"]}]},{"id":"cull-move","category":"shipping","no":"No.23","name":"育成舎へ廃豚移動","purposeShort":"出荷前管理を円滑にする","aspects":[{"id":"isolation-move","name":"他群との接触回避と静かな移動","kanten":"他群との接触による感染拡大を避け、静かに移動して転倒させないか。","levels":["他群との接触を避けず、急かして転倒させ、収容限界を超えて過密にする。","指示があれば移動させるが、接触回避や収容確認に漏れがある。","指示があれば静かにひと通り移動できる。","指示がなくても他群との接触を避け、静かに移動して過密を防ぐ。","移動時の感染・負傷リスクを理解し、安全な廃豚移動を新人に指導できる。"]},{"id":"move-record-feed","name":"移動の記録と出荷前給餌管理","kanten":"廃豚移動を記録して在庫を合わせ、出荷予定日までの給餌管理を明確にできるか。","levels":["移動を記録せず在庫が合わず、出荷までの給餌管理も曖昧で飼料コストを膨らませる。","指示があれば記録するが、在庫照合や給餌管理に漏れがある。","指示があれば移動をひと通り記録できる。","指示がなくても移動を記録して在庫を合わせ、出荷予定日までの給餌を管理する。","在庫管理と飼料コストの関係を理解し、記録と給餌管理を新人に指導できる。"]}]},{"id":"cull-prep","category":"shipping","no":"No.28","name":"廃豚準備","purposeShort":"出荷作業を安全に進める","aspects":[{"id":"final-check","name":"歩様の最終確認と無理のない誘導","kanten":"体調と歩様を最終確認し、歩行困難豚への無理な誘導を避け、急かして暴れさせないか。","levels":["歩行困難豚を無理に誘導し、出荷当日に急かして暴れさせ打撲・PSE肉を招く。","指示があれば確認するが、歩様の最終確認や誘導の丁寧さに漏れがある。","指示があれば体調・歩様をひと通り最終確認できる。","指示がなくても歩様を最終確認し、無理な誘導を避けて落ち着いて誘導する。","PSE肉・打撲の原因を理解し、安全な誘導と最終確認を新人に指導できる。"]},{"id":"fast-notify","name":"絶食タイミングと業者への事前連絡","kanten":"絶食開始タイミングを守り、出荷業者へ頭数・個体情報を事前連絡できるか。","levels":["絶食開始を誤って糞汚染や体重ロスを招き、業者への事前連絡も漏らして積込みを混乱させる。","指示があれば準備するが、絶食時期や事前連絡に漏れがある。","指示があれば絶食のタイミングをひと通り守れる。","指示がなくても絶食開始を適切に管理し、業者へ頭数・個体情報を事前連絡する。","絶食管理と積込みの段取りを理解し、事前連絡と準備を新人に指導できる。"]}]}]}</script>
